<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Baseball Scoreboard</title>

    <style>
        body {
            background: #0b0b0b;
            color: white;
            font-family: Arial, sans-serif;
        }

        .scoreboard {
            width: 700px;
            margin: 40px auto;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0,0,0,0.4);
        }

        .header h2 {
            margin: 0;
            text-align: center;
        }

        .scores {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 25px 0;
        }

        .team {
            text-align: center;
            width: 40%;
        }

        .team h3 {
            margin: 0;
            font-size: 16px;
        }

        .score {
            display: block;
            font-size: 40px;
            font-weight: bold;
            margin-top: 5px;
        }

        .pitch-small {
            font-size: 14px;
            margin-top: 4px;
            color: #ccc;
        }

        .inning-display {
            width: 20%;
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            position: relative;
        }

        .base {
            position: absolute;
            width: 18px;
            height: 18px;
            background: #777;
            transform: rotate(45deg);
        }

        .base.on {
            background: red !important;
        }

        .base.second { top: -32px; left: 50%; transform: translateX(-50%) rotate(45deg); }
        .base.first  { top: 50%; right: -32px; transform: translateY(-50%) rotate(45deg); }
        .base.third  { top: 50%; left: -32px; transform: translateY(-50%) rotate(45deg); }
        .base.home   { bottom: -32px; left: 50%; transform: translateX(-50%) rotate(45deg); }

        .diamond-line {
            position: absolute;
            background: #777;
            height: 2px;
        }

        .line-1-2 { width: 45px; top: 8%; right: -6px; transform: rotate(35deg); }
        .line-2-3 { width: 45px; top: 8%; left: -6px; transform: rotate(-35deg); }
        .line-3-home { width: 45px; bottom: 8%; left: -6px; transform: rotate(35deg); }
        .line-home-1 { width: 45px; bottom: 8%; right: -6px; transform: rotate(-35deg); }

        /* --- ELECTRONIC SCOREBOARD MATCHING THE IMAGE --- */

        .electronic-scoreboard {
            background: #0b2d66; /* same blue */
            padding: 20px;
            border-radius: 10px;
            margin-top: 25px;
            color: #ff2a2a; /* LED red */
            font-family: 'Courier New', monospace;
            text-align: center;
            border: 6px solid #001a40; /* outer frame like image */
        }

        .scoreboard-top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .scoreboard-top .sb-box {
            width: 18%;
            background: #001a40;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            border: 4px solid #ff2a2a; /* thick LED border */
        }

        .sb-value {
            display: block;
            font-size: 36px;
            margin-top: 5px;
        }

        .scoreboard-grid {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .scoreboard-grid th,
        .scoreboard-grid td {
            border: 3px solid #ff2a2a; /* thick LED borders */
            padding: 10px;
            font-size: 22px;
            background: #001a40;
            color: #ff2a2a;
        }

        .team-label {
            font-weight: bold;
            width: 80px;
            background: #001a40;
        }

        #updatedTime {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div id="scoreboard" class="scoreboard">

    <div class="header">
        <h2 id="teamName">Loading...</h2>
    </div>

    <div class="scores">
        <!-- GUEST TEAM ON LEFT -->
        <div class="team">
            <h3 id="opponentTeamName">Opponent</h3>
            <span id="opponentScore" class="score">0</span>
            <div class="pitch-small">Pitches: <span id="pitchOpp">0</span></div>
        </div>

        <div class="inning-display">
            <span id="currentInning">-</span>

            <div class="base second" id="base2"></div>
            <div class="base first" id="base1"></div>
            <div class="base third" id="base3"></div>
            <div class="base home" id="baseHome"></div>

            <div class="diamond-line line-1-2"></div>
            <div class="diamond-line line-2-3"></div>
            <div class="diamond-line line-3-home"></div>
            <div class="diamond-line line-home-1"></div>
        </div>

        <!-- HOME TEAM ON RIGHT -->
        <div class="team">
            <h3 id="yourTeamName">Your Team</h3>
            <span id="yourScore" class="score">0</span>
            <div class="pitch-small">Pitches: <span id="pitchTeam">0</span></div>
        </div>
    </div>

    <!-- ⭐ NEW ELECTRONIC SCOREBOARD -->
    <div class="electronic-scoreboard">

        <div class="scoreboard-top">
            <div class="sb-box">PITCHES HOME <span id="pitchesHome" class="sb-value">0</span></div>
            <div class="sb-box">BALL <span id="balls" class="sb-value">0</span></div>
            <div class="sb-box">STRIKE <span id="strikes" class="sb-value">0</span></div>
            <div class="sb-box">OUT <span id="outs" class="sb-value">0</span></div>
            <div class="sb-box">PITCHES GUEST <span id="pitchesGuest" class="sb-value">0</span></div>
        </div>

        <table class="scoreboard-grid">
            <thead>
                <tr>
                    <th></th>
                    <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
                    <th>6</th><th>7</th><th>8</th><th>9</th>
                    <th>TOTAL</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="team-label">GUEST</td>
                    <td id="g1">0</td><td id="g2">0</td><td id="g3">0</td><td id="g4">0</td><td id="g5">0</td>
                    <td id="g6">0</td><td id="g7">0</td><td id="g8">0</td><td id="g9">0</td>
                    <td id="gTotal">0</td>
                </tr>
                <tr>
                    <td class="team-label">HOME</td>
                    <td id="h1">0</td><td id="h2">0</td><td id="h3">0</td><td id="h4">0</td><td id="h5">0</td>
                    <td id="h6">0</td><td id="h7">0</td><td id="h8">0</td><td id="h9">0</td>
                    <td id="hTotal">0</td>
                </tr>
            </tbody>
        </table>

    </div>

    <p id="updatedTime"></p>
</div>

<script>
    const apiUrl = "https://gamefunction-fzdkbcguh9bmhsgx.westus-01.azurewebsites.net";

    const params = new URLSearchParams(window.location.search);
    const gameID = params.get("gameID");

    async function loadGame() {
        const response = await fetch(`${apiUrl}/api/ListGames?gameID=${gameID}`);
        const games = await response.json();
        const game = games.find(g => g.GameID === gameID);

        // TEAM NAMES
        document.getElementById("teamName").textContent =
            `${game.MyTeam} vs ${game.OpponentTeamName}`;

        document.getElementById("yourTeamName").textContent = game.MyTeam;
        document.getElementById("opponentTeamName").textContent = game.OpponentTeamName;

        // SCORES
        document.getElementById("yourScore").textContent = game.Score.Team;
        document.getElementById("opponentScore").textContent = game.Score.Opponent;

        // PITCHES
        document.getElementById("pitchTeam").textContent = game.Pitches.Team;
        document.getElementById("pitchOpp").textContent = game.Pitches.Opponent;

        document.getElementById("pitchesHome").textContent = game.Pitches.Team;
        document.getElementById("pitchesGuest").textContent = game.Pitches.Opponent;

        // BALLS / STRIKES / OUTS
        document.getElementById("balls").textContent = game.Count.Balls;
        document.getElementById("strikes").textContent = game.Count.Strikes;
        document.getElementById("outs").textContent = game.Count.Outs;

        // INNINGS
        for (let i = 0; i < 9; i++) {
            document.getElementById("g" + (i+1)).textContent = game.Innings.Opponent[i] ?? "0";
            document.getElementById("h" + (i+1)).textContent = game.Innings.Team[i] ?? "0";
        }

        // TOTALS
        document.getElementById("gTotal").textContent = game.Totals.Opponent[0];
        document.getElementById("hTotal").textContent = game.Totals.Team[0];

        document.getElementById("updatedTime").textContent =
            "Loaded from DynamoDB: " + new Date().toLocaleTimeString();
    }

    loadGame();
</script>

</body>
</html>
