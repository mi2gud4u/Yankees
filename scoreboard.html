<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Baseball Scoreboard</title>

<style>
    body {
        background: #0b0b0b;
        color: white;
        font-family: Arial, sans-serif;
    }
    
    @font-face {
        font-family: 'FairPlay';
        src: url('/Yankees/fonts/fairplay.otf.woff2') format('woff2'),
             url('/Yankees/fonts/fairplay.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
    }

    .scoreboard {
        width: 520px;
        margin: 40px auto;
        padding: 20px;
        background: #1a1a1a;
        border-radius: 12px;
        box-shadow: 0 0 12px rgba(0,0,0,0.4);
    }

    .header h2 {
        margin: 0 0 50px 0;
        text-align: center;
    }

    .scores {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 25px 0;
    }

    .team {
        text-align: center;
        width: 40%;
    }
    
    .team h3 {
        margin: 0;
        font-size: 16px;
    }

    .score {
        display: block;
        font-size: 40px;
        font-weight: bold;
        margin-top: 5px;
    }

    .pitch-small {
        font-size: 14px;
        margin-top: 4px;
        color: #ccc;
    }

    .inning-display {
        width: 20%;
        text-align: center;
        font-size: 48px;
        font-weight: bold;
        position: relative;
    }

    /* ⭐ BASES + DIAMOND */
    .base {
        position: absolute;
        width: 18px;
        height: 18px;
        background: #777;
        transform: rotate(45deg);
    }

    .base.on {
        background: red !important;
    }

    .base.second { top: -32px; left: 50%; transform: translateX(-50%) rotate(45deg); }
    .base.first  { top: 50%; right: -32px; transform: translateY(-50%) rotate(45deg); }
    .base.third  { top: 50%; left: -32px; transform: translateY(-50%) rotate(45deg); }
    .base.home   { bottom: -32px; left: 50%; transform: translateX(-50%) rotate(45deg); }

    .diamond-line {
        position: absolute;
        background: #777;
        height: 2px;
    }

    .line-1-2 { width: 45px; top: 8%; right: -6px; transform: rotate(35deg); }
    .line-2-3 { width: 45px; top: 8%; left: -6px; transform: rotate(-35deg); }
    .line-3-home { width: 45px; bottom: 8%; left: -6px; transform: rotate(35deg); }
    .line-home-1 { width: 45px; bottom: 8%; right: -6px; transform: rotate(-35deg); }

    .inning-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
        font-size: 14px;
    }

    .inning-table th,
    .inning-table td {
        border: 1px solid #444;
        padding: 6px;
        text-align: center;
    }

    .inning-table th {
        background: #333;
    }

    .bottom-bar {
        margin-top: 20px;
        padding: 12px;
        background: #222;
        border-radius: 8px;
        text-align: center;
    }

    .bottom-bar span {
        font-size: 18px;
        font-weight: bold;
        margin: 0 15px;
    }

    #updatedTime {
        text-align: center;
        margin-top: 10px;
        font-size: 12px;
        color: #aaa;
    }

    /* ⭐ ELECTRONIC SCOREBOARD — EXACT PROPORTIONS FROM PHOTO */
    
    .electronic-scoreboard {
        background-color: #002395;
        border: 6px solid #b22222;
        padding: 25px 20px 20px 20px;
        width: 700px; /* matches real board width */
        margin: 40px auto;
        display: flex;
        flex-direction: column;
        gap: 14px;
    }
    
    /* LED digits */
    .digit {
        background-color: #000;
        color: #ff3b3b;;
        font-family: 'FairPlay', 'Digital-7', monospace;
        font-size: 2.8rem;
        padding: 8px 0;
        border-radius: 3px;
        text-shadow: 0 0 8px rgba(255, 0, 0, 0.8);
        border: 1px solid #222;
        width: 48px;
        margin: 0 auto;
    }


    .digit.total-digit {
        width: 90px;
        font-size: 3rem;
    }

    .digit.wide {
        width: 70px;
    }
    
    /* Top row proportions match photo */
    .top-row {
        display: grid;
        grid-template-columns: 160px 120px 120px 120px 160px;
        align-items: center;
        border-bottom: 3px solid #b22222;
        padding-bottom: 12px;
        font-size: 1.5rem;
        font-weight: bold;
        text-align: center;
    }
    
    /* Innings grid EXACT spacing */
    .innings-grid {
        display: grid;
        grid-template-columns:
            120px          /* LABEL */
            repeat(9, 1fr) /* Innings 1–9 (equal width, matches photo) */
            120px;         /* TOTAL under PITCHES HOME */
        align-items: center;
        text-align: center;
        padding: 6px 0;
    }
    
    .innings-grid > div {
        padding: 6px 5;
    }
    
    .label {
        font-size: 1.3rem;
        font-weight: 900;
    }
    
    .inning-num {
        font-size: 1.3rem;
        font-weight: bold;
    }
    
    .total-digit {
        width: 70px;
        font-size: 2rem;
    }
    #gameStatus {
        font-size: 20px;
        font-weight: bold;
        color: #fff;
        letter-spacing: 1px;
    }
    
    #gameStatus.live {
        color: #ff3b3b; /* bright red */
    }
    
    #gameStatus.final {
        color: #cccccc; /* gray */
    }
    
    #gameStatus.future {
        color: #4da6ff; /* blue */
    }
    
    #gameStatus.scheduled {
        color: #f2c94c; /* yellow */
    }

</style>

<body>

<!-- ⭐ MAIN SCOREBOARD (ON TOP) -->
<div id="scoreboard" class="scoreboard">

    <div class="header">
        <h2 id="teamName">Loading...</h2>
    </div>

    <div class="scores">
        <div class="team">
            <h3 id="yourTeamName">Your Team</h3>
            <span id="yourScore" class="score">0</span>
        </div>

        <div class="inning-display">
            <span id="currentInning">-</span>

            <div class="base second" id="base2"></div>
            <div class="base first" id="base1"></div>
            <div class="base third" id="base3"></div>
            <div class="base home" id="baseHome"></div>

            <div class="diamond-line line-1-2"></div>
            <div class="diamond-line line-2-3"></div>
            <div class="diamond-line line-3-home"></div>
            <div class="diamond-line line-home-1"></div>
        </div>

        <div class="team">
            <h3 id="opponentTeamName">Opponent</h3>
            <span id="opponentScore" class="score">0</span>
        </div>
    </div>

    <table class="inning-table">
        <thead id="inningHeader"></thead>
        <tbody id="inningBody"></tbody>
    </table>

    <div class="bottom-bar">
        <span id="gameStatus">STATUS</span>
    </div>


</div>

<!-- ⭐ ELECTRONIC SCOREBOARD BELOW -->
<div class="electronic-scoreboard" id="electronicBoardContainer">

    <div class="top-row">
        <div class="top-item">
            PITCHES GUEST
            <div id="pitchesGuest" class="digit wide">0</div>
        </div>

        <div class="top-item">
            BALL
            <div id="balls" class="digit">0</div>
        </div>

        <div class="top-item">
            STRIKE
            <div id="strikes" class="digit">0</div>
        </div>

        <div class="top-item">
            OUT
            <div id="outs" class="digit">0</div>
        </div>

        <div class="top-item">
            PITCHES HOME
            <div id="pitchesHome" class="digit wide">0</div>
        </div>
    </div>

    <div class="innings-grid">
        <div class="label"></div>
        <div class="inning-num">1</div>
        <div class="inning-num">2</div>
        <div class="inning-num">3</div>
        <div class="inning-num">4</div>
        <div class="inning-num">5</div>
        <div class="inning-num">6</div>
        <div class="inning-num">7</div>
        <div class="inning-num">8</div>
        <div class="inning-num">9</div>
    
        <div class="label">TOTAL</div>
    </div>

    <div class="innings-grid">
        <div class="label">GUEST</div>
        <div class="digit" id="g1">0</div>
        <div class="digit" id="g2">0</div>
        <div class="digit" id="g3">0</div>
        <div class="digit" id="g4">0</div>
        <div class="digit" id="g5">0</div>
        <div class="digit" id="g6">0</div>
        <div class="digit" id="g7">0</div>
        <div class="digit" id="g8">0</div>
        <div class="digit" id="g9">0</div>
 
        <div class="digit total-digit" id="gTotal">0</div>
    </div>
    
    <div class="innings-grid">
        <div class="label">HOME</div>
        <div class="digit" id="h1">0</div>
        <div class="digit" id="h2">0</div>
        <div class="digit" id="h3">0</div>
        <div class="digit" id="h4">0</div>
        <div class="digit" id="h5">0</div>
        <div class="digit" id="h6">0</div>
        <div class="digit" id="h7">0</div>
        <div class="digit" id="h8">0</div>
        <div class="digit" id="h9">0</div>
 
    
        <div class="digit total-digit" id="hTotal">0</div>
    </div>

</div>

<script>
    const apiUrl = "https://gamefunction-fzdkbcguh9bmhsgx.westus-01.azurewebsites.net";
    
    const params = new URLSearchParams(window.location.search);
    const gameID = params.get("gameID");
    
    async function loadGame() {
        const response = await fetch(`${apiUrl}/api/ListGames?gameID=${gameID}`);
        let games = await response.json();
    
        if (!Array.isArray(games)) games = [games];
    
        const game = games.find(g => String(g.gameID) === String(gameID));
        if (!game) {
            console.error("Game not found", gameID);
            return;
        }
    
        // HOME/AWAY
        const isHome = game.home_away === "home";
    
        const leftTeamName  = isHome ? game.opponent_team.name : game.myTeam;
        const rightTeamName = isHome ? game.myTeam : game.opponent_team.name;
    
        const leftScore  = isHome ? game.score.opponent_team : game.score.team;
        const rightScore = isHome ? game.score.team : game.score.opponent_team;
    
        const guestInn = isHome ? game.line_score.opponent_team.scores : game.line_score.team.scores;
        const homeInn  = isHome ? game.line_score.team.scores : game.line_score.opponent_team.scores;
    
        const guestTotal = isHome ? game.line_score.opponent_team.totals[0] : game.line_score.team.totals[0];
        const homeTotal  = isHome ? game.line_score.team.totals[0] : game.line_score.opponent_team.totals[0];

        // ⭐ STATUS LOGIC
        const now = new Date();
        const start = new Date(game.start_ts);
        const end = new Date(game.end_ts);
        
        let statusText = "";
        let statusClass = "";
        
        // Completed → FINAL
        if (game.game_status === "completed") {
            statusText = "FINAL";
            statusClass = "final";
        }
        // Today + between start/end → LIVE
        else if (
            now.toDateString() === start.toDateString() &&
            now >= start &&
            now <= end
        ) {
            statusText = "LIVE";
            statusClass = "live";
        }
        // Future → formatted date
        else if (start > now) {
            const datePart = start.toLocaleDateString("en-US", {
                month: "short",
                day: "numeric",
                year: "numeric"
            });
        
            const timePart = start.toLocaleTimeString("en-US", {
                hour: "numeric",
                minute: "2-digit"
            });
        
            statusText = `${datePart} @ ${timePart}`;
            statusClass = "future";
        }
        // Past but not completed → SCHEDULED
        else {
            statusText = "SCHEDULED";
            statusClass = "scheduled";
        }
        
        // ⭐ UPDATE BOTTOM BAR
        const statusEl = document.getElementById("gameStatus");
        statusEl.textContent = statusText;
        statusEl.className = statusClass;

    
        // TITLE
        document.getElementById("teamName").textContent =
            `${game.myTeam} vs ${game.opponent_team.name}`;
    
        // TEAM NAMES
        document.getElementById("yourTeamName").textContent = leftTeamName;
        document.getElementById("opponentTeamName").textContent = rightTeamName;
    
        // SCORES
        document.getElementById("yourScore").textContent = leftScore;
        document.getElementById("opponentScore").textContent = rightScore;
    
        // TOTALS
        document.getElementById("gTotal").textContent = guestTotal ?? 0;
        document.getElementById("hTotal").textContent = homeTotal ?? 0;
    
        // PITCHES / COUNT
        document.getElementById("pitchesHome").textContent = game.Pitches?.Team ?? 0;
        document.getElementById("pitchesGuest").textContent = game.Pitches?.Opponent ?? 0;
    
        document.getElementById("balls").textContent = game.Count?.Balls ?? 0;
        document.getElementById("strikes").textContent = game.Count?.Strikes ?? 0;
        document.getElementById("outs").textContent = game.Count?.Outs ?? 0;
    
        // PAD INNINGS TO 9
        const gInn = [...guestInn];
        const hInn = [...homeInn];
    
        while (gInn.length < 9) gInn.push(0);
        while (hInn.length < 9) hInn.push(0);
    
        // FILL INNING CELLS
        for (let i = 0; i < 9; i++) {
            document.getElementById("g" + (i + 1)).textContent = gInn[i];
            document.getElementById("h" + (i + 1)).textContent = hInn[i];
        }
    
        // TIMESTAMP
        document.getElementById("updatedTime").textContent =
            "Loaded from DynamoDB: " + new Date().toLocaleTimeString();
    }
    
    loadGame();

</script>


</body>
</html>
