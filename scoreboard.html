<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Baseball Scoreboard</title>

<style>
    body {
        background: #0b0b0b;
        color: white;
        font-family: Arial, sans-serif;
    }

    .scoreboard {
        width: 520px;
        margin: 40px auto;
        padding: 20px;
        background: #1a1a1a;
        border-radius: 12px;
        box-shadow: 0 0 12px rgba(0,0,0,0.4);
    }

    .header h2 {
        margin: 0;
        text-align: center;
    }
    .scores {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 25px 0;
    }

    .team {
        text-align: center;
        width: 40%;
    }

    .team h3 {
        margin: 0;
        font-size: 16px;
    }

    .score {
        display: block;
        font-size: 40px;
        font-weight: bold;
        margin-top: 5px;
    }

    .pitch-small {
        font-size: 14px;
        margin-top: 4px;
        color: #ccc;
    }

    .inning-number {
        width: 20%;
        text-align: center;
        font-size: 48px;
        font-weight: bold;
    }

    /* ⭐ BASES */
    .base {
        position: absolute;
        width: 18px;
        height: 18px;
        background: #777;
        transform: rotate(45deg);
    }

    .base.on {
        background: red !important;
    }

    .base.second { top: -32px; left: 50%; transform: translateX(-50%) rotate(45deg); }
    .base.first  { top: 50%; right: -32px; transform: translateY(-50%) rotate(45deg); }
    .base.third  { top: 50%; left: -32px; transform: translateY(-50%) rotate(45deg); }
    .base.home   { bottom: -32px; left: 50%; transform: translateX(-50%) rotate(45deg); }

    .diamond-line {
        position: absolute;
        background: #777;
        height: 2px;
    }

    .line-1-2 { width: 45px; top: 8%; right: -6px; transform: rotate(35deg); }
    .line-2-3 { width: 45px; top: 8%; left: -6px; transform: rotate(-35deg); }
    .line-3-home { width: 45px; bottom: 8%; left: -6px; transform: rotate(35deg); }
    .line-home-1 { width: 45px; bottom: 8%; right: -6px; transform: rotate(-35deg); }

    /* ⭐ ELECTRONIC SCOREBOARD (SEPARATED BELOW) */
    .electronic-scoreboard {
        background-color: #002395;
        border: 4px solid #b22222;
        padding: 40px 20px 20px 20px;
        font-family: 'Arial Narrow', sans-serif;
        color: white;
        width: fit-content;
        margin: 40px auto;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .digit {
        background-color: #000;
        color: #ff0000;
        font-family: 'Courier New', monospace;
        font-weight: bold;
        font-size: 2.4rem;
        padding: 5px 0;
        border-radius: 4px;
        text-shadow: 0 0 10px rgba(255, 0, 0, 0.7);
        border: 1px solid #333;
        width: 55px;
        margin: 0 auto;
    }

    .digit.wide {
        width: 80px;
        font-size: 2.1rem;
    }

    .top-row {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        align-items: center;
        border-bottom: 2px solid #b22222;
        padding-bottom: 15px;
        font-size: 2.2rem;
        font-weight: bold;
    }

    .top-item {
        text-align: center;
    }

    .innings-grid {
        display: grid;
        grid-template-columns: 120px repeat(9, 60px) 80px;
        align-items: center;
        text-align: center;
        padding: 10px 0;
    }

    .innings-grid > div {
        padding: 12px 0;
    }

    .label {
        font-size: 1.6rem;
        font-weight: 900;
        text-transform: uppercase;
        color: white;
    }

    .inning-num {
        font-size: 1.6rem;
        font-weight: bold;
        color: white;
    }

    .total-digit {
        width: 80px;
        font-size: 2.1rem;
    }
</style>

<body>

<!-- ⭐ MAIN SCOREBOARD WITH DIAMOND INSIDE -->
<div id="scoreboard" class="scoreboard">

    <div class="header">
        <h2 id="teamName">Loading...</h2>
    </div>

    <div class="scores">
        <div class="team">
            <h3 id="yourTeamName">Your Team</h3>
            <span id="yourScore" class="score">0</span>
        </div>

        <div class="inning-display">
            <span id="currentInning">-</span>

            <div class="base second" id="base2"></div>
            <div class="base first" id="base1"></div>
            <div class="base third" id="base3"></div>
            <div class="base home" id="baseHome"></div>

            <div class="diamond-line line-1-2"></div>
            <div class="diamond-line line-2-3"></div>
            <div class="diamond-line line-3-home"></div>
            <div class="diamond-line line-home-1"></div>
        </div>

        <div class="team">
            <h3 id="opponentTeamName">Opponent</h3>
            <span id="opponentScore" class="score">0</span>
        </div>
    </div>

    <table class="inning-table">
        <thead id="inningHeader"></thead>
        <tbody id="inningBody"></tbody>
    </table>

    <div class="bottom-bar">
        <span>Balls: <span id="balls">0</span></span>
        <span>Strikes: <span id="strikes">0</span></span>
        <span>Outs: <span id="outs">0</span></span>
    </div>

    <p id="updatedTime"></p>
</div>

<!-- ⭐ ELECTRONIC SCOREBOARD BELOW -->
<div class="electronic-scoreboard">

    <div class="top-row">
        <div class="top-item">
            PITCHES GUEST
            <div id="pitchesGuest" class="digit wide">0</div>
        </div>

        <div class="top-item">
            BALL
            <div id="balls" class="digit">0</div>
        </div>

        <div class="top-item">
            STRIKE
            <div id="strikes" class="digit">0</div>
        </div>

        <div class="top-item">
            OUT
            <div id="outs" class="digit">0</div>
        </div>

        <div class="top-item">
            PITCHES HOME
            <div id="pitchesHome" class="digit wide">0</div>
        </div>
    </div>

    <div class="innings-grid">
        <div class="label"></div>
        <div class="inning-num">1</div>
        <div class="inning-num">2</div>
        <div class="inning-num">3</div>
        <div class="inning-num">4</div>
        <div class="inning-num">5</div>
        <div class="inning-num">6</div>
        <div class="inning-num">7</div>
        <div class="inning-num">8</div>
        <div class="inning-num">9</div>
        <div class="label">TOTAL</div>
    </div>

    <div class="innings-grid">
        <div class="label">GUEST</div>
        <div class="digit" id="g1">0</div>
        <div class="digit" id="g2">0</div>
        <div class="digit" id="g3">0</div>
        <div class="digit" id="g4">0</div>
        <div class="digit" id="g5">0</div>
        <div class="digit" id="g6">0</div>
        <div class="digit" id="g7">0</div>
        <div class="digit" id="g8">0</div>
        <div class="digit" id="g9">0</div>
        <div class="digit total-digit" id="gTotal">0</div>
    </div>

    <div class="innings-grid">
        <div class="label">HOME</div>
        <div class="digit" id="h1">0</div>
        <div class="digit" id="h2">0</div>
        <div class="digit" id="h3">0</div>
        <div class="digit" id="h4">0</div>
        <div class="digit" id="h5">0</div>
        <div class="digit" id="h6">0</div>
        <div class="digit" id="h7">0</div>
        <div class="digit" id="h8">0</div>
        <div class="digit" id="h9">0</div>
        <div class="digit total-digit" id="hTotal">0</div>
    </div>

</div>

<script>
const apiUrl = "https://gamefunction-fzdkbcguh9bmhsgx.westus-01.azurewebsites.net";

const params = new URLSearchParams(window.location.search);
const gameID = params.get("gameID");

async function loadGame() {
    const response = await fetch(`${apiUrl}/api/ListGames?gameID=${gameID}`);
    const games = await response.json();
    const game = games.find(g => g.GameID === gameID);

    document.getElementById("teamName").textContent =
        `${game.MyTeam} vs ${game.OpponentTeamName}`;

    document.getElementById("yourTeamName").textContent = game.MyTeam;
    document.getElementById("opponentTeamName").textContent = game.OpponentTeamName;

    document.getElementById("yourScore").textContent = game.Score.Team;
    document.getElementById("opponentScore").textContent = game.Score.Opponent;

    document.getElementById("pitchTeam").textContent = game.Pitches?.Team ?? 0;
    document.getElementById("pitchOpp").textContent = game.Pitches?.Opponent ?? 0;
    
    document.getElementById("pitchesHome").textContent = game.Pitches?.Team ?? 0;
    document.getElementById("pitchesGuest").textContent = game.Pitches?.Opponent ?? 0;
    
    document.getElementById("balls").textContent = game.Count?.Balls ?? 0;
    document.getElementById("strikes").textContent = game.Count?.Strikes ?? 0;
    document.getElementById("outs").textContent = game.Count?.Outs ?? 0;

    // ⭐ PAD INNINGS TO 9
    const teamInn = [...game.Innings.Team];
    const oppInn = [...game.Innings.Opponent];

    while (teamInn.length < 9) teamInn.push(0);
    while (oppInn.length < 9) oppInn.push(0);

    for (let i = 0; i < 9; i++) {
        const gVal = oppInn[i] ?? "";
        const hVal = teamInn[i] ?? "";
    
        document.getElementById("g" + (i + 1)).textContent = gVal;
        document.getElementById("h" + (i + 1)).textContent = hVal;
    }


    document.getElementById("gTotal").textContent = game.Totals.Opponent[0] ?? 0;
    document.getElementById("hTotal").textContent = game.Totals.Team[0] ?? 0;


    document.getElementById("updatedTime").textContent =
        "Loaded from DynamoDB: " + new Date().toLocaleTimeString();
}

loadGame();
</script>

</body>
</html>
