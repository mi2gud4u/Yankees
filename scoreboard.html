<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Baseball Scoreboard</title>

    <style>
        body {
            background: #0b0b0b;
            color: white;
            font-family: Arial, sans-serif;
        }

        .scoreboard {
            width: 700px;
            margin: 40px auto;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0,0,0,0.4);
        }

        .header h2 {
            margin: 0;
            text-align: center;
        }

        .scores {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 25px 0;
        }

        .team {
            text-align: center;
            width: 40%;
        }

        .team h3 {
            margin: 0;
            font-size: 16px;
        }

        .score {
            display: block;
            font-size: 40px;
            font-weight: bold;
            margin-top: 5px;
        }

        .pitch-small {
            font-size: 14px;
            margin-top: 4px;
            color: #ccc;
        }

        .inning-display {
            width: 20%;
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            position: relative;
        }

        .base {
            position: absolute;
            width: 18px;
            height: 18px;
            background: #777;
            transform: rotate(45deg);
        }

        .base.on {
            background: red !important;
        }

        .base.second { top: -32px; left: 50%; transform: translateX(-50%) rotate(45deg); }
        .base.first  { top: 50%; right: -32px; transform: translateY(-50%) rotate(45deg); }
        .base.third  { top: 50%; left: -32px; transform: translateY(-50%) rotate(45deg); }
        .base.home   { bottom: -32px; left: 50%; transform: translateX(-50%) rotate(45deg); }

        .diamond-line {
            position: absolute;
            background: #777;
            height: 2px;
        }

        .line-1-2 { width: 45px; top: 8%; right: -6px; transform: rotate(35deg); }
        .line-2-3 { width: 45px; top: 8%; left: -6px; transform: rotate(-35deg); }
        .line-3-home { width: 45px; bottom: 8%; left: -6px; transform: rotate(35deg); }
        .line-home-1 { width: 45px; bottom: 8%; right: -6px; transform: rotate(-35deg); }

        /* --- ELECTRONIC SCOREBOARD (FINAL TUNED VERSION) --- */
        
        .electronic-scoreboard {
            background-color: #002395;
            border: 4px solid #b22222;
            padding: 40px 20px 20px 20px;
            font-family: 'Arial Narrow', sans-serif;
            color: white;
            width: fit-content;
            margin: 60px auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        /* LED DIGITS */
        .digit {
            background-color: #000;
            color: #ff0000;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 2.5rem;
            padding: 5px 0;
            border-radius: 4px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.7);
            border: 1px solid #333;
            width: 55px; /* default width for inning digits */
            margin: 0 auto;
        }
        
        /* 2-digit wide boxes (pitches) */
        .digit.wide {
            width: 85px;
        }
        
        /* TOP ROW */
        .top-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            align-items: center;
            border-bottom: 2px solid #b22222;
            padding-bottom: 10px;
            font-size: 2rem; /* bigger text */
            font-weight: bold;
        }
        
        .top-item {
            text-align: center;
            border-right: none;
        }
        
        /* separator after PITCHES HOME */
        .top-item:nth-child(1) {
            border-right: 2px solid #b22222;
        }
        
        /* separator BEFORE PITCHES GUEST */
        .top-item:nth-child(5) {
            border-left: 2px solid #b22222;
        }
        
        /* INNINGS GRID */
        .innings-grid {
            display: grid;
            grid-template-columns: 120px repeat(9, 55px) 100px;
            align-items: center;
            text-align: center;
        }
        
        /* remove separators between inning cells */
        .innings-grid > div {
            padding: 8px 0;
            border-right: none;
        }
        
        /* separator before TOTAL column */
        .innings-grid > div:nth-child(11) {
            border-left: 2px solid #b22222;
        }
        
        /* TOTAL label */
        .label {
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            color: white;
        }
        
        /* inning numbers */
        .inning-num {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
        }
        
        /* TOTAL score same size as inning digits */
        .total-digit {
            width: 55px;
        }
    </style>
</head>
<body>

<div id="scoreboard" class="scoreboard">

    <div class="header">
        <h2 id="teamName">Loading...</h2>
    </div>

    <div class="scores">
        <!-- GUEST LEFT -->
        <div class="team">
            <h3 id="opponentTeamName">Opponent</h3>
            <span id="opponentScore" class="score">0</span>
            <div class="pitch-small">Pitches: <span id="pitchOpp">0</span></div>
        </div>

        <div class="inning-display">
            <span id="currentInning">-</span>

            <div class="base second" id="base2"></div>
            <div class="base first" id="base1"></div>
            <div class="base third" id="base3"></div>
            <div class="base home" id="baseHome"></div>

            <div class="diamond-line line-1-2"></div>
            <div class="diamond-line line-2-3"></div>
            <div class="diamond-line line-3-home"></div>
            <div class="diamond-line line-home-1"></div>
        </div>

        <!-- HOME RIGHT -->
        <div class="team">
            <h3 id="yourTeamName">Your Team</h3>
            <span id="yourScore" class="score">0</span>
            <div class="pitch-small">Pitches: <span id="pitchTeam">0</span></div>
        </div>
    </div>

    <div class="electronic-scoreboard">
    
        <!-- TOP ROW -->
        <div class="top-row">
            <div class="top-item">
                PITCHES HOME
                <div id="pitchesHome" class="digit wide">0</div>
            </div>
    
            <div class="top-item">
                BALL
                <div id="balls" class="digit">0</div>
            </div>
    
            <div class="top-item">
                STRIKE
                <div id="strikes" class="digit">0</div>
            </div>
    
            <div class="top-item">
                OUT
                <div id="outs" class="digit">0</div>
            </div>
    
            <div class="top-item">
                PITCHES GUEST
                <div id="pitchesGuest" class="digit wide">0</div>
            </div>
        </div>
    
        <!-- INNING NUMBERS -->
        <div class="innings-grid">
            <div class="label"></div>
            <div class="inning-num">1</div>
            <div class="inning-num">2</div>
            <div class="inning-num">3</div>
            <div class="inning-num">4</div>
            <div class="inning-num">5</div>
            <div class="inning-num">6</div>
            <div class="inning-num">7</div>
            <div class="inning-num">8</div>
            <div class="inning-num">9</div>
            <div class="label">TOTAL</div>
        </div>
    
        <!-- GUEST ROW -->
        <div class="innings-grid">
            <div class="label">GUEST</div>
            <div class="digit" id="g1">0</div>
            <div class="digit" id="g2">0</div>
            <div class="digit" id="g3">0</div>
            <div class="digit" id="g4">0</div>
            <div class="digit" id="g5">0</div>
            <div class="digit" id="g6">0</div>
            <div class="digit" id="g7">0</div>
            <div class="digit" id="g8">0</div>
            <div class="digit" id="g9">0</div>
            <div class="digit total-digit" id="gTotal">0</div>
        </div>
    
        <!-- HOME ROW -->
        <div class="innings-grid">
            <div class="label">HOME</div>
            <div class="digit" id="h1">0</div>
            <div class="digit" id="h2">0</div>
            <div class="digit" id="h3">0</div>
            <div class="digit" id="h4">0</div>
            <div class="digit" id="h5">0</div>
            <div class="digit" id="h6">0</div>
            <div class="digit" id="h7">0</div>
            <div class="digit" id="h8">0</div>
            <div class="digit" id="h9">0</div>
            <div class="digit total-digit" id="hTotal">0</div>
        </div>
    
    </div>

    <p id="updatedTime"></p>
</div>

<script>
    const apiUrl = "https://gamefunction-fzdkbcguh9bmhsgx.westus-01.azurewebsites.net";

    const params = new URLSearchParams(window.location.search);
    const gameID = params.get("gameID");

    async function loadGame() {
        const response = await fetch(`${apiUrl}/api/ListGames?gameID=${gameID}`);
        const games = await response.json();
        const game = games.find(g => g.GameID === gameID);

        document.getElementById("teamName").textContent =
            `${game.MyTeam} vs ${game.OpponentTeamName}`;

        document.getElementById("yourTeamName").textContent = game.MyTeam;
        document.getElementById("opponentTeamName").textContent = game.OpponentTeamName;

        document.getElementById("yourScore").textContent = game.Score.Team;
        document.getElementById("opponentScore").textContent = game.Score.Opponent;

        document.getElementById("pitchTeam").textContent = game.Pitches.Team;
        document.getElementById("pitchOpp").textContent = game.Pitches.Opponent;

        document.getElementById("pitchesHome").textContent = game.Pitches.Team;
        document.getElementById("pitchesGuest").textContent = game.Pitches.Opponent;

        document.getElementById("balls").textContent = game.Count.Balls;
        document.getElementById("strikes").textContent = game.Count.Strikes;
        document.getElementById("outs").textContent = game.Count.Outs;

        for (let i = 0; i < 9; i++) {
            document.getElementById("g" + (i+1)).textContent = game.Innings.Opponent[i] ?? "0";
            document.getElementById("h" + (i+1)).textContent = game.Innings.Team[i] ?? "0";
        }

        document.getElementById("gTotal").textContent = game.Totals.Opponent[0];
        document.getElementById("hTotal").textContent = game.Totals.Team[0];

        document.getElementById("updatedTime").textContent =
            "Loaded from DynamoDB: " + new Date().toLocaleTimeString();
    }

    loadGame();
</script>

</body>
</html>
