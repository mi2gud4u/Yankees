<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dummy Baseball Game</title>
  <link rel="stylesheet" href="css/live.css">

</head>
<body>
<div id="broadcast-container">

    <header>
        <div>BASEBALL SIMULATION</div>
        <div id="game-id">TEAM A @ TEAM B</div>
        <div>BASEBALL NETWORK</div>
    </header>

    <!-- MAIN SCOREBOARD -->
    <div id="scoreboard">

        <!-- TEAM A -->
        <div class="team-block">
            <div class="team-name" id="leftTeam">TEAM A</div>
            <div class="rhe-inline">
                R <span id="gTotal">0</span>
                &nbsp; H <span id="teamHits">0</span>
                &nbsp; E <span id="gErr">0</span>
            </div>
        </div>

      <div class="score" id="gScoreBox">0</div>

        <!-- CENTER INFO -->
        <div id="center-info">
            <div id="inning-box">1ST INNING</div>
            <div id="count-box">
                B:<span id="balls">0</span>
                &nbsp;S:<span id="strikes">0</span>
                &nbsp;O:<span id="outs">0</span>
            </div>
        </div>

      <div class="score" id="hScoreBox">0</div>

        <!-- TEAM B -->
        <div class="team-block" style="text-align:right;">
            <div class="team-name" id="rightTeam">TEAM B</div>
            <div class="rhe-inline">
                R <span id="hTotal">0</span>
                &nbsp; H <span id="oppHits">0</span>
                &nbsp; E <span id="hErr">0</span>
            </div>
        </div>

    </div>

    <!-- PLAYER PANELS -->
    <div id="player-panels">
        <div class="panel batting-panel">
            <div class="panel-left">
                <div class="panel-title">BATTING</div>
            </div>
    
            <div class="panel-right">
                <span id="batterName">Waiting for batter...</span>
            </div>
        </div>
    </div>


    <!-- FIELD VIEW WITH STRIKE ZONE AND PITCH SPEED -->
    <div id="field-view">
        <div class="pitch-style" id="pitchType">—</div>

        <div id="diamond">
            <div></div><div id="base2" class="base"></div><div></div>
            <div id="base3" class="base"></div><div></div><div id="base1" class="base"></div>
            <div></div>                        
            <div></div>
            <div></div>               
        </div>
        
    </div>

    <!-- CONTROL BAR -->
    <div id="control-bar">
        <button id="start-btn" class="control-btn" onclick="startSim()">START</button>
        <button id="stop-btn" class="control-btn" onclick="stopSim()">STOP</button>
        <button id="reset-btn" class="control-btn" onclick="resetSim()">RESET</button>
    </div>

    <!-- PLAY BY PLAY -->
    <div id="pbp-wrapper">
        <h2 id="pbp-toggle">PLAY BY PLAY ▼</h2>
        <div id="pbp-latest" class="pbp-line"></div>
        <div id="playByPlay" class="collapsed"></div>
    </div>

</div>

<script src = "scripts/live.js"></script>
</body>
</html>
