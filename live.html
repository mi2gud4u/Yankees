<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dummy Baseball Game</title>
<style>
body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
}

#broadcast-container {
    width: 1280px;
    background: #000;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(to right, #b00, #004);
    padding: 10px 20px;
    font-size: 20px;
    font-weight: 700;
}

/* MAIN SCOREBOARD */
#scoreboard {
    background: #111;
    padding: 10px 20px 15px 20px;
    display: grid;
    grid-template-columns: 1.5fr 1fr 1.5fr;
    align-items: center;
}

/* TEAM BLOCKS */
.team-block {
    text-align: left;
    font-size: 20px;
    font-weight: 700;
}

.team-name {
    margin-bottom: 4px;
}

.rhe-labels,
.rhe-values {
    display: grid;
    grid-template-columns: repeat(3, 40px);
    gap: 4px;
    font-size: 14px;
}

.rhe-labels div {
    text-align: center;
    color: #ccc;
}

.rhe-values div {
    background: #222;
    text-align: center;
    padding: 4px 0;
    border-radius: 4px;
}
.rhe-inline {
    font-size: 18px;
    font-weight: 700;
    display: flex;
    justify-content: flex-start;
    gap: 10px;
}

.team-block[style*="text-align:right;"] .rhe-inline {
    justify-content: flex-end;
}

/* CENTER INFO */
#center-info {
    text-align: center;
}

#inning-box {
    background: #222;
    color: #ff0;
    padding: 6px 12px;
    border-radius: 6px;
    font-weight: 700;
    margin-bottom: 6px;
}

#count-box {
    background: #333;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 18px;
    font-weight: 700;
}

/* RUNNERS DIAMOND */
#diamond {
    margin-top: 20px;
    display: grid;
    grid-template-columns: 120px 120px 120px;
    grid-template-rows: 120px 120px 120px;
    justify-content: center;
    align-items: center;
    height: 100%;
}

.base {
    width: 50px;
    height: 50px;
    background: #444;
    margin: auto;
    transform: rotate(45deg);
}

.base.active {
    background: #ff0;
}

/* PLAYER PANELS */
#player-panels {
    display: flex;
    justify-content: space-between;
    padding: 20px;
}

.panel {
    width: 48%;
    background: #111;
    border: 2px solid #00e5ff;
    border-radius: 10px;
    padding: 15px;
}

.panel-title {
    color: #ff0;
    font-size: 20px;
    margin-bottom: 10px;
}

.panel-body {
    font-size: 16px;
}
/* Single full-width batting panel */
.batting-panel {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #111;
    border: 2px solid #00e5ff;
    border-radius: 10px;
    padding: 15px 20px;
}

.panel-left {
    font-size: 22px;
    font-weight: 700;
    color: #ff0;
}

.panel-right {
    font-size: 18px;
    text-align: right;
}

/* FIELD VIEW */
#field-view {
    background: #000;
    border: 3px solid #00e5ff;
    border-radius: 10px;
    height: 350px;
    margin: 0 20px 20px 20px;
    position: relative;
}

/* STRIKE ZONE */
#strike-zone {
    width: 140px;
    height: 180px;
    border: 3px solid #fff;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
}

/* PITCH MARKERS (1,2,3 ETC.) */
.pitch-marker {
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    color: #ff0;
}

/* PITCH SPEED */
#pitch-type {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #222;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 18px;
    color: #ff0;
    font-weight: 700;
}


/* PITCH TEXT (LAST PITCH DESCRIPTION) */
#pitchText {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: #111;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 16px;
}

/* CONTROL BAR */
#control-bar {
    display: flex;
    justify-content: space-between;
    padding: 15px 20px;
    background: #111;
    border-top: 2px solid #00e5ff;
}

/* NEW BUTTON STYLE */
.control-btn {
    flex: 1;
    margin: 0 10px;
    padding: 10px 0; /* half the height */
    font-size: 16px; /* smaller text */
    font-weight: 700;
    border: 3px solid currentColor; /* outline style */
    border-radius: 12px; /* rounded like the example */
    background: transparent; /* outline only */
    cursor: pointer;
    color: #fff;
    text-align: center;
    transition: 0.2s ease;
}

/* COLOR SCHEME (same as before) */
#start-btn { color: green; }
#stop-btn  { color: red; }
#reset-btn { color: blue; }

/* Hover effect */
.control-btn:hover {
    background: rgba(255,255,255,0.1);
}


/* PLAY BY PLAY */
#pbp-wrapper {
    padding: 20px;
}

#pbp-toggle {
    cursor: pointer;
    user-select: none;
}

#playByPlay {
    height: 200px;
    overflow-y: auto;
    background: #111;
    border: 2px solid #00e5ff;
    padding: 10px;
    border-radius: 10px;
    font-size: 14px;
    transition: max-height 0.3s ease;
    max-height: 200px;
}

#playByPlay.collapsed {
    max-height: 0;
    padding: 0 10px;
    border-width: 0;
}

</style>
</head>
<body>
<div id="broadcast-container">

    <header>
        <div>BASEBALL SIMULATION</div>
        <div id="game-id">TEAM A @ TEAM B</div>
        <div>BASEBALL NETWORK</div>
    </header>

    <!-- MAIN SCOREBOARD -->
    <div id="scoreboard">

        <!-- TEAM A -->
        <div class="team-block">
            <div class="team-name" id="leftTeam">TEAM A</div>
            <div class="rhe-inline">
                R <span id="gTotal">0</span>
                &nbsp; H <span id="pitchesGuest">0</span>
                &nbsp; E <span id="gErr">0</span>
            </div>
        </div>

        <!-- CENTER INFO -->
        <div id="center-info">
            <div id="inning-box">1ST INNING</div>
            <div id="count-box">
                B:<span id="balls">0</span>
                &nbsp;S:<span id="strikes">0</span>
                &nbsp;O:<span id="outs">0</span>
            </div>
        </div>

        <!-- TEAM B -->
        <div class="team-block" style="text-align:right;">
            <div class="team-name" id="rightTeam">TEAM B</div>
            <div class="rhe-inline">
                R <span id="hTotal">0</span>
                &nbsp; H <span id="pitchesHome">0</span>
                &nbsp; E <span id="hErr">0</span>
            </div>
        </div>

    </div>

    <!-- PLAYER PANELS -->
    <div id="player-panels">
        <div class="panel batting-panel">
            <div class="panel-left">
                <div class="panel-title">BATTING</div>
            </div>
    
            <div class="panel-right">
                <span id="atbat-stats">Waiting for batter...</span>
            </div>
        </div>
    </div>


    <!-- FIELD VIEW WITH STRIKE ZONE AND PITCH SPEED -->
    <div id="field-view">
            <div id="diamond">
                <div></div> <div id="base2" class="base"></div> <div></div>
                <div id="base3" class="base"></div> <div></div> <div id="base1" class="base"></div>
                <div></div> <div></div> <div></div>
            </div>
        <div id="pitchText">—</div>
    </div>

    <!-- CONTROL BAR -->
    <div id="control-bar">
        <button id="start-btn" class="control-btn" onclick="startSim()">START</button>
        <button id="stop-btn" class="control-btn" onclick="stopSim()">STOP</button>
        <button id="reset-btn" class="control-btn" onclick="resetSim()">RESET</button>
    </div>

    <!-- PLAY BY PLAY -->
    <div id="pbp-wrapper">
        <h2 id="pbp-toggle">PLAY BY PLAY ▼</h2>
    
        <!-- Always visible last line -->
        <div id="pbp-latest" class="pbp-line"></div>
    
        <!-- Collapsible full list -->
        <div id="playByPlay" class="collapsed"></div>
    </div>

</div>

  <script>
    
    const simApiUrl = "https://livescoreapi-2hbs.onrender.com";

const apiUrl = "https://gamefunction-fzdkbcguh9bmhsgx.westus-01.azurewebsites.net";
const params = new URLSearchParams(window.location.search);
const gameID = params.get("gameID");

async function loadTeams() {
    const res = await fetch(`${apiUrl}/api/games/${gameID}`);
    const game = await res.json();

    const isHome = game.home_away === "home";
    const myName = game.myTeam;
    const oppName = game.opponent_team.name;

    const leftTeamName  = isHome ? oppName : myName;
    const rightTeamName = isHome ? myName : oppName;

    document.getElementById("game-id").textContent =
        `${leftTeamName} @ ${rightTeamName}`;
}

loadTeams();

  /* ============================================================
     POLL SERVER SIMULATION ENGINE
  ============================================================ */
  setInterval(async () => {
    try {
        const res = await fetch(`${simApiUrl}/api/sim-game`);
        const sim = await res.json();
        updateFromSim(sim);
    } catch (err) {
        console.error("Sim error:", err);
    }
}, 1000);

  
  /* ============================================================
     UPDATE UI FROM SERVER SIM DATA
  ============================================================ */
  function updateFromSim(sim) {
  
      // Balls / Strikes / Outs
      document.getElementById("balls").textContent = sim.balls;
      document.getElementById("strikes").textContent = sim.strikes;
      document.getElementById("outs").textContent = sim.outs;
  
      // Pitch counts
      document.getElementById("pitchesGuest").textContent = sim.teamPitchCount;
      document.getElementById("pitchesHome").textContent = sim.oppPitchCount;
  
      // Bases
      document.getElementById("base1").classList.toggle("active", sim.runnerOn1);
      document.getElementById("base2").classList.toggle("active", sim.runnerOn2);
      document.getElementById("base3").classList.toggle("active", sim.runnerOn3);
  
      // Pitch-by-pitch
      document.getElementById("pitchText").textContent = sim.lastPitch;
  
      // Batter name (your existing logic sets batterName)
      document.getElementById("atbat-stats").textContent = batterName;
  


  
      // Inning + box score
      updateInnings(sim);
  }


  
 function updateInnings(sim) {
    const guest = sim.teamScores;
    const home  = sim.oppScores;

    for (let i = 1; i <= 9; i++) {
        document.getElementById("g" + i).textContent = guest[i - 1] ?? "";
        document.getElementById("h" + i).textContent = home[i - 1] ?? "";
    }

    document.getElementById("gTotal").textContent = guest.reduce((a,b)=>a+b,0);
    document.getElementById("hTotal").textContent = home.reduce((a,b)=>a+b,0);
}

 function startSim() {
        fetch(`${simApiUrl}/api/sim/start`, { method: "POST" });
    }
    
    function stopSim() {
        fetch(`${simApiUrl}/api/sim/stop`, { method: "POST" });
    }
    
    function resetSim() {
        fetch(`${simApiUrl}/api/sim/reset`, { method: "POST" });
    }

document.getElementById("pbp-toggle").addEventListener("click", () => {
    const pbp = document.getElementById("playByPlay");
    const toggle = document.getElementById("pbp-toggle");

    pbp.classList.toggle("collapsed");

    if (pbp.classList.contains("collapsed")) {
        toggle.textContent = "PLAY BY PLAY ►";
    } else {
        toggle.textContent = "PLAY BY PLAY ▼";
    }
});



  </script>
</body>
</html>
