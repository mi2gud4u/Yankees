<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dummy Baseball Game</title>
  <style>
      body {
          background: #0b0b0b;
          color: white;
          font-family: Arial, sans-serif;
      }
      .electronic-scoreboard {
          border: 6px solid #b22222;
          padding: 25px 20px 20px 20px;
          width: 900px;
          margin: 40px auto;
          display: flex;
          flex-direction: column;
          gap: 14px;
      }
      .digit {
          background-color: #000;
          color: #ff0000;
          font-family: 'Digital-7', monospace;
          font-size: 2rem;
          padding: 8px 0;
          border-radius: 3px;
          text-shadow: 0 0 8px rgba(255, 0, 0, 0.8);
          border: 1px solid #222;
          width: 48px;
          margin: 0 auto;
      }
      .digit.wide {
          width: 70px;
      }
    .base {
        will-change: background, box-shadow;
    }

      .top-row {
          display: grid;
          grid-template-columns: 300px 120px 120px 120px 300px;
          align-items: center;
          justify-items: center;
          border-bottom: 3px solid #b22222;
          padding-bottom: 12px;
          font-size: 1.5rem;
          font-weight: bold;
          text-align: center;
      }
      .innings-grid {
          display: grid;
          grid-template-columns:
              120px
              repeat(9, 1fr)
              120px;
          align-items: center;
          text-align: center;
          padding: 6px 0;
      }
      .innings-grid > div {
          padding: 6px 5px;
      }
      .label {
          font-size: 1.3rem;
          font-weight: 900;
      }
      .inning-num {
          font-size: 1.3rem;
          font-weight: bold;
      }
      .total-digit {
          width: 70px;
          font-size: 2rem;
      }
      #game-id {
          text-align: center;
      }

      /* Bases / field */
      .field-row {
          display: flex;
          justify-content: space-between;
          align-items: flex-start;
          gap: 20px;
          margin-top: 10px;
      }
      .bases {
          width: 220px;
          height: 220px;
          border: 2px solid #555;
          position: relative;
          margin-left: 20px;
      }
      .base {
          width: 30px;
          height: 30px;
          border: 2px solid #777;
          position: absolute;
          transform: rotate(45deg);
          background: #111;
      }
      .base.active {
          background: #00ff00;
          box-shadow: 0 0 10px #00ff00;
      }
      .base.first  { bottom: 20px; right: 20px; }
      .base.second { top: 20px; right: 50%; transform: translateX(50%) rotate(45deg); }
      .base.third  { bottom: 20px; left: 20px; }

      /* Panels */
      .panels {
          flex: 1;
          display: flex;
          flex-direction: column;
          gap: 10px;
      }
      .panel {
          border: 1px solid #444;
          padding: 8px;
          background: #111;
          font-size: 0.9rem;
      }
      .panel h3 {
          margin: 0 0 4px 0;
          font-size: 1rem;
          border-bottom: 1px solid #333;
          padding-bottom: 3px;
      }
      #pitchText {
          font-family: monospace;
          color: #0ff;
      }
      #playByPlay {
          max-height: 160px;
          overflow-y: auto;
          font-size: 0.85rem;
      }
      .pbp-line {
          margin-bottom: 3px;
      }

      .players {
          display: flex;
          justify-content: space-between;
          font-size: 0.9rem;
      }
      .players div {
          width: 48%;
      }

      button {
          margin-top: 10px;
          padding: 6px 10px;
          background: #222;
          color: #fff;
          border: 1px solid #555;
          cursor: pointer;
      }
      button:hover {
          background: #333;
      }
      .control-buttons {
          display: flex;
          justify-content: space-between;
          width: 100%;
          margin-top: 15px;
      }
      
      .control-buttons button {
          flex: 1;
          margin: 0 10px;
          padding: 14px 0;
          font-size: 20px;
          font-weight: 600;
          background: transparent;
          color: #00e5ff; /* turquoise text */
          border: 3px solid #00e5ff; /* turquoise border */
          border-radius: 12px;
          cursor: pointer;
          transition: 0.2s ease;
      }
      
      .control-buttons button:hover {
          background: rgba(0, 229, 255, 0.15);
      }


      .pbp-wrapper {
          width: 900px;
          margin: 20px auto;
          background: #111;
          border: 2px solid #444;
          padding: 10px;
      }
      
      .pbp-wrapper h2 {
          margin: 0 0 8px 0;
          font-size: 1.2rem;
          border-bottom: 1px solid #333;
          padding-bottom: 4px;
      }
      
      .pbp-scroll {
          max-height: 220px;
          overflow-y: auto;
          padding-right: 6px;
          font-size: 0.9rem;
      }

  </style>
</head>
<body>
  
  <h1 id="game-id" data-game-id="dummy-12345">Yankees @ Red Sox</h1>

  <div class="electronic-scoreboard" id="electronicBoardContainer">

      <div class="top-row">
          <div class="top-item">
              PITCHES GUEST
              <div id="pitchesGuest" class="digit wide">0</div>
          </div>

          <div class="top-item">
              BALL
              <div id="balls" class="digit">0</div>
          </div>

          <div class="top-item">
              STRIKE
              <div id="strikes" class="digit">0</div>
          </div>

          <div class="top-item">
              OUT
              <div id="outs" class="digit">0</div>
          </div>

          <div class="top-item">
              PITCHES HOME
              <div id="pitchesHome" class="digit wide">0</div>
          </div>
      </div>

      <div class="innings-grid">
          <div class="label"></div>
          <div class="inning-num">1</div>
          <div class="inning-num">2</div>
          <div class="inning-num">3</div>
          <div class="inning-num">4</div>
          <div class="inning-num">5</div>
          <div class="inning-num">6</div>
          <div class="inning-num">7</div>
          <div class="inning-num">8</div>
          <div class="inning-num">9</div>
          <div class="label">TOTAL</div>
      </div>

      <div class="innings-grid">
          <div class="label">GUEST</div>
          <div class="digit" id="g1">0</div>
          <div class="digit" id="g2">0</div>
          <div class="digit" id="g3">0</div>
          <div class="digit" id="g4">0</div>
          <div class="digit" id="g5">0</div>
          <div class="digit" id="g6">0</div>
          <div class="digit" id="g7">0</div>
          <div class="digit" id="g8">0</div>
          <div class="digit" id="g9">0</div>
          <div class="digit total-digit" id="gTotal">0</div>
      </div>
      
      <div class="innings-grid">
          <div class="label">HOME</div>
          <div class="digit" id="h1">0</div>
          <div class="digit" id="h2">0</div>
          <div class="digit" id="h3">0</div>
          <div class="digit" id="h4">0</div>
          <div class="digit" id="h5">0</div>
          <div class="digit" id="h6">0</div>
          <div class="digit" id="h7">0</div>
          <div class="digit" id="h8">0</div>
          <div class="digit" id="h9">0</div>
          <div class="digit total-digit" id="hTotal">0</div>
      </div>

      <div class="field-row">
          <div class="bases">
              <div class="base first"  id="base1"></div>
              <div class="base second" id="base2"></div>
              <div class="base third"  id="base3"></div>
          </div>

          <div class="panels">
              <div class="panel">
                  <h3>Pitch‑by‑Pitch</h3>
                  <div id="pitchText">Waiting for first pitch...</div>
              </div>
              <div class="panel players">
                  <div>
                      <strong>Guest Batter:</strong>
                      <div id="guestBatter">Player 1</div>
                  </div>
                  <div>
                      <strong>Home Batter:</strong>
                      <div id="homeBatter">Player 1</div>
                  </div>
              </div>
            <div class="control-buttons">
                <button onclick="startSim()">Start</button>
                <button onclick="stopSim()">Stop</button>
                <button onclick="resetSim()">Reset</button>
            </div>

          </div>
      </div>
  </div>
  <div class="pbp-wrapper">
      <h2>Play‑by‑Play</h2>
      <div id="playByPlay" class="pbp-scroll"></div>
  </div>

  <script>
    
    const simApiUrl = "https://livescoreapi-2hbs.onrender.com";

const apiUrl = "https://gamefunction-fzdkbcguh9bmhsgx.westus-01.azurewebsites.net";
const params = new URLSearchParams(window.location.search);
const gameID = params.get("gameID");

async function loadTeams() {
    const res = await fetch(`${apiUrl}/api/games/${gameID}`);
    const game = await res.json();

    const isHome = game.home_away === "home";
    const myName = game.myTeam;
    const oppName = game.opponent_team.name;

    const leftTeamName  = isHome ? oppName : myName;
    const rightTeamName = isHome ? myName : oppName;

    document.getElementById("game-id").textContent =
        `${leftTeamName} @ ${rightTeamName}`;
}

loadTeams();

  /* ============================================================
     POLL SERVER SIMULATION ENGINE
  ============================================================ */
  setInterval(async () => {
    try {
        const res = await fetch(`${simApiUrl}/api/sim-game`);
        const sim = await res.json();
        updateFromSim(sim);
    } catch (err) {
        console.error("Sim error:", err);
    }
}, 1000);

  
  /* ============================================================
     UPDATE UI FROM SERVER SIM DATA
  ============================================================ */
 function updateFromSim(sim) {

    // Balls / Strikes / Outs
    document.getElementById("balls").textContent = sim.balls;
    document.getElementById("strikes").textContent = sim.strikes;
    document.getElementById("outs").textContent = sim.outs;

    // Pitch counts
    document.getElementById("pitchesGuest").textContent = sim.teamPitchCount;
    document.getElementById("pitchesHome").textContent = sim.oppPitchCount;

    // Bases
    document.getElementById("base1").classList.toggle("active", sim.runnerOn1);
    document.getElementById("base2").classList.toggle("active", sim.runnerOn2);
    document.getElementById("base3").classList.toggle("active", sim.runnerOn3);

    // Pitch-by-pitch
    document.getElementById("pitchText").textContent = sim.lastPitch;

    // Play-by-play
    const pbp = document.getElementById("playByPlay");
    pbp.innerHTML = sim.playByPlay
        .map(line => `<div class="pbp-line">${line}</div>`)
        .join("");

    // Inning + box score
    updateInnings(sim);
}

  
 function updateInnings(sim) {
    const guest = sim.teamScores;
    const home  = sim.oppScores;

    for (let i = 1; i <= 9; i++) {
        document.getElementById("g" + i).textContent = guest[i - 1] ?? "";
        document.getElementById("h" + i).textContent = home[i - 1] ?? "";
    }

    document.getElementById("gTotal").textContent = guest.reduce((a,b)=>a+b,0);
    document.getElementById("hTotal").textContent = home.reduce((a,b)=>a+b,0);
}

 function startSim() {
        fetch(`${simApiUrl}/api/sim/start`, { method: "POST" });
    }
    
    function stopSim() {
        fetch(`${simApiUrl}/api/sim/stop`, { method: "POST" });
    }
    
    function resetSim() {
        fetch(`${simApiUrl}/api/sim/reset`, { method: "POST" });
    }


  </script>
</body>
</html>
