<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dummy Baseball Game</title>
<style>
body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
}

#broadcast-container {
    width: 1280px;
    background: #000;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #111;
    padding: 12px 20px;
    font-size: 22px;
    font-weight: 700;
}

/* SCOREBOARD (Mockup 1 style) */
#scoreboard {
    padding: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: 600;
}

#score-top {
    text-align: left;
    font-size: 22px;
    margin-bottom: 8px;
}

#score-mid {
    text-align: center;
    font-size: 24px;
    margin-bottom: 8px;
}

#score-bottom {
    text-align: right;
    font-size: 22px;
}

/* PLAYER PANELS */
#player-panels {
    display: flex;
    justify-content: space-between;
    padding: 20px;
}

.panel {
    width: 48%;
}

.panel-title {
    background: #ff0;
    color: #000;
    padding: 6px 10px;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
}

.panel-body {
    font-size: 18px;
    line-height: 1.4;
}

/* Pitch Speed under AT BAT */
#pitch-speed {
    margin-top: 10px;
    font-size: 22px;
    font-weight: 700;
    color: #ff0;
}

/* FIELD VIEW */
#field-view {
    margin: 20px auto;
    width: 260px;
    height: 340px;
    position: relative;
}

/* STRIKE ZONE */
#strike-zone {
    width: 140px;
    height: 180px;
    border: 3px solid #fff;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
}

.pitch-marker {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    color: #ff0;
}

/* BUTTONS */
#control-bar {
    text-align: center;
    margin-top: 20px;
}

.control-btn {
    width: 180px;
    padding: 16px 0;
    margin: 0 10px;
    font-size: 22px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    color: #fff;
}

#start-btn { background: #b00; }
#stop-btn  { background: #555; }
#reset-btn { background: #004; }

.control-btn:hover {
    opacity: 0.85;
}

/* PLAY BY PLAY */
#pbp-wrapper {
    padding: 20px;
}

#playByPlay {
    height: 200px;
    overflow-y: auto;
    background: #111;
    padding: 10px;
    border-radius: 6px;
    font-size: 16px;
}
</style>

<body>
<div id="broadcast-container">

<header>
    <div>MLB SIMULATION</div>
    <div id="game-id">TEAM A @ TEAM B</div>
    <div>SPORTS NETWORK</div>
</header>

<!-- SCOREBOARD -->
<div id="scoreboard">

    <div id="score-top">
        TEAM A — R:<span id="gTotal">0</span>
        H:<span id="pitchesGuest">0</span>
        E:<span id="gErr">0</span>
    </div>

    <div id="score-mid">
        <span id="inningText">1ST INNING</span> |
        <span>B:<span id="balls">0</span></span> -
        <span>S:<span id="strikes">0</span></span> |
        <span><span id="outs">0</span> OUT</span>
    </div>

    <div id="score-bottom">
        TEAM B — R:<span id="hTotal">0</span>
        H:<span id="pitchesHome">0</span>
        E:<span id="hErr">0</span>
    </div>

</div>

<!-- PLAYER PANELS -->
<div id="player-panels">

    <div class="panel">
        <div class="panel-title">AT BAT</div>
        <div class="panel-body" id="atbat-stats">
            Johnson — AVG .325 | HR 12 | RBI 38
        </div>
        <div id="pitch-speed">94 MPH</div>
    </div>

    <div class="panel">
        <div class="panel-title">PITCHING</div>
        <div class="panel-body" id="pitching-stats">
            Martinez — P:<span id="pitchesGuest">57</span> |
            ERA 2.45 | K 5
        </div>
    </div>

</div>

<!-- STRIKE ZONE -->
<div id="field-view">
    <div id="strike-zone">
        <div class="pitch-marker">1</div>
        <div class="pitch-marker">2</div>
        <div class="pitch-marker">3</div>
        <div></div><div></div><div></div>
        <div></div><div></div><div></div>
    </div>
</div>

<!-- BUTTONS -->
<div id="control-bar">
    <button id="start-btn" class="control-btn" onclick="startSim()">START</button>
    <button id="stop-btn" class="control-btn" onclick="stopSim()">STOP</button>
    <button id="reset-btn" class="control-btn" onclick="resetSim()">RESET</button>
</div>

<!-- PLAY BY PLAY -->
<div id="pbp-wrapper">
    <h2>Play‑by‑Play</h2>
    <div id="playByPlay"></div>
</div>

</div>

  <script>
    
    const simApiUrl = "https://livescoreapi-2hbs.onrender.com";

const apiUrl = "https://gamefunction-fzdkbcguh9bmhsgx.westus-01.azurewebsites.net";
const params = new URLSearchParams(window.location.search);
const gameID = params.get("gameID");

async function loadTeams() {
    const res = await fetch(`${apiUrl}/api/games/${gameID}`);
    const game = await res.json();

    const isHome = game.home_away === "home";
    const myName = game.myTeam;
    const oppName = game.opponent_team.name;

    const leftTeamName  = isHome ? oppName : myName;
    const rightTeamName = isHome ? myName : oppName;

    document.getElementById("game-id").textContent =
        `${leftTeamName} @ ${rightTeamName}`;
}

loadTeams();

  /* ============================================================
     POLL SERVER SIMULATION ENGINE
  ============================================================ */
  setInterval(async () => {
    try {
        const res = await fetch(`${simApiUrl}/api/sim-game`);
        const sim = await res.json();
        updateFromSim(sim);
    } catch (err) {
        console.error("Sim error:", err);
    }
}, 1000);

  
  /* ============================================================
     UPDATE UI FROM SERVER SIM DATA
  ============================================================ */
 function updateFromSim(sim) {

    // Balls / Strikes / Outs
    document.getElementById("balls").textContent = sim.balls;
    document.getElementById("strikes").textContent = sim.strikes;
    document.getElementById("outs").textContent = sim.outs;

    // Pitch counts
    document.getElementById("pitchesGuest").textContent = sim.teamPitchCount;
    document.getElementById("pitchesHome").textContent = sim.oppPitchCount;

    // Bases
    document.getElementById("base1").classList.toggle("active", sim.runnerOn1);
    document.getElementById("base2").classList.toggle("active", sim.runnerOn2);
    document.getElementById("base3").classList.toggle("active", sim.runnerOn3);

    // Pitch-by-pitch
    document.getElementById("pitchText").textContent = sim.lastPitch;

    // Play-by-play
    const pbp = document.getElementById("playByPlay");
    pbp.innerHTML = sim.playByPlay
        .map(line => `<div class="pbp-line">${line}</div>`)
        .join("");

    // Inning + box score
    updateInnings(sim);
}

  
 function updateInnings(sim) {
    const guest = sim.teamScores;
    const home  = sim.oppScores;

    for (let i = 1; i <= 9; i++) {
        document.getElementById("g" + i).textContent = guest[i - 1] ?? "";
        document.getElementById("h" + i).textContent = home[i - 1] ?? "";
    }

    document.getElementById("gTotal").textContent = guest.reduce((a,b)=>a+b,0);
    document.getElementById("hTotal").textContent = home.reduce((a,b)=>a+b,0);
}

 function startSim() {
        fetch(`${simApiUrl}/api/sim/start`, { method: "POST" });
    }
    
    function stopSim() {
        fetch(`${simApiUrl}/api/sim/stop`, { method: "POST" });
    }
    
    function resetSim() {
        fetch(`${simApiUrl}/api/sim/reset`, { method: "POST" });
    }


  </script>
</body>
</html>
