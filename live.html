<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dummy Baseball Game</title>
  <style>
      .electronic-scoreboard {
        border: 6px solid #b22222;
        padding: 25px 20px 20px 20px;
        width: 700px; /* matches real board width */
        margin: 40px auto;
        display: flex;
        flex-direction: column;
        gap: 14px;
    }
    
    /* LED digits */
    .digit {
        background-color: #000;
        color: #ff0000;
        font-family: 'Digital-7', monospace;
        font-size: 2rem;
        padding: 8px 0;
        border-radius: 3px;
        text-shadow: 0 0 8px rgba(255, 0, 0, 0.8);
        border: 1px solid #222;
        width: 48px;
        margin: 0 auto;
    }
    
    .digit.wide {
        width: 70px;
    }
    
    /* Top row proportions match photo */
    .top-row {
        display: grid;
        grid-template-columns: 160px 120px 120px 120px 160px;
        align-items: center;
        border-bottom: 3px solid #b22222;
        padding-bottom: 12px;
        font-size: 1.5rem;
        font-weight: bold;
        text-align: center;
    }
    
    /* Innings grid EXACT spacing */
    .innings-grid {
        display: grid;
        grid-template-columns:
            120px          /* LABEL */
            repeat(9, 1fr) /* Innings 1–9 (equal width, matches photo) */
            120px;         /* TOTAL under PITCHES HOME */
        align-items: center;
        text-align: center;
        padding: 6px 0;
    }
    
    .innings-grid > div {
        padding: 6px 5;
    }
    
    .label {
        font-size: 1.3rem;
        font-weight: 900;
    }
    
    .inning-num {
        font-size: 1.3rem;
        font-weight: bold;
    }
    
    .total-digit {
        width: 70px;
        font-size: 2rem;
    }

    #gameStatus {
        font-size: 20px;
        font-weight: bold;
        color: #fff;
        letter-spacing: 1px;
    }
    
    #gameStatus.live {
        color: #ff3b3b; /* bright red */
    }
    
    #gameStatus.final {
        color: #cccccc; /* gray */
    }
    
    #gameStatus.future {
        color: #4da6ff; /* blue */
    }
    
    #gameStatus.scheduled {
        color: #f2c94c; /* yellow */
    }

</style>

<body>

 <h1 id="game-id" data-game-id="dummy-12345">Yankees @ Red Sox</h1>

<!-- ⭐ ELECTRONIC SCOREBOARD BELOW -->
<div class="electronic-scoreboard" id="electronicBoardContainer">

    <div class="top-row">
        <div class="top-item">
            PITCHES GUEST
            <div id="pitchesGuest" class="digit wide">0</div>
        </div>

        <div class="top-item">
            BALL
            <div id="balls" class="digit">0</div>
        </div>

        <div class="top-item">
            STRIKE
            <div id="strikes" class="digit">0</div>
        </div>

        <div class="top-item">
            OUT
            <div id="outs" class="digit">0</div>
        </div>

        <div class="top-item">
            PITCHES HOME
            <div id="pitchesHome" class="digit wide">0</div>
        </div>
    </div>

    <div class="innings-grid">
        <div class="label"></div>
        <div class="inning-num">1</div>
        <div class="inning-num">2</div>
        <div class="inning-num">3</div>
        <div class="inning-num">4</div>
        <div class="inning-num">5</div>
        <div class="inning-num">6</div>
        <div class="inning-num">7</div>
        <div class="inning-num">8</div>
        <div class="inning-num">9</div>
    
        <div class="label">TOTAL</div>
    </div>

    <div class="innings-grid">
        <div class="label">GUEST</div>
        <div class="digit" id="g1">0</div>
        <div class="digit" id="g2">0</div>
        <div class="digit" id="g3">0</div>
        <div class="digit" id="g4">0</div>
        <div class="digit" id="g5">0</div>
        <div class="digit" id="g6">0</div>
        <div class="digit" id="g7">0</div>
        <div class="digit" id="g8">0</div>
        <div class="digit" id="g9">0</div>
 
        <div class="digit total-digit" id="gTotal">0</div>
    </div>
    
    <div class="innings-grid">
        <div class="label">HOME</div>
        <div class="digit" id="h1">0</div>
        <div class="digit" id="h2">0</div>
        <div class="digit" id="h3">0</div>
        <div class="digit" id="h4">0</div>
        <div class="digit" id="h5">0</div>
        <div class="digit" id="h6">0</div>
        <div class="digit" id="h7">0</div>
        <div class="digit" id="h8">0</div>
        <div class="digit" id="h9">0</div>
 
    
        <div class="digit total-digit" id="hTotal">0</div>
    </div>
<h2>Manual Controls</h2>

<div class="controls">
  <h3>Pitch Count</h3>
  <button onclick="inc('awayPitch')">Away + Pitch</button>
  <span id="awayPitch">0</span>
  <br>
  <button onclick="inc('homePitch')">Home + Pitch</button>
  <span id="homePitch">0</span>

  <h3>Count</h3>
  <button onclick="inc('balls', 0, 3)">Ball +</button>
  <span id="balls">0</span>
  <br>
  <button onclick="inc('strikes', 0, 2)">Strike +</button>
  <span id="strikes">0</span>

  <h3>Outs</h3>
  <button onclick="inc('outs', 0, 2)">Out +</button>
  <span id="outs">0</span>

  <h3>Inning Scores</h3>
  <div>
    <label>Away Inning:</label>
    <select id="awayInningSelect"></select>
    <button onclick="incInning('away')">+ Run</button>
  </div>

  <div>
    <label>Home Inning:</label>
    <select id="homeInningSelect"></select>
    <button onclick="incInning('home')">+ Run</button>
  </div>

  <h3>Total Runs</h3>
  <div>Away Total: <span id="awayTotal">0</span></div>
  <div>Home Total: <span id="homeTotal">0</span></div>
</div>

</div>

<script>
  // Simple increment helper
  function inc(id, min = 0, max = null) {
    let el = document.getElementById(id);
    let val = parseInt(el.textContent);

    if (max !== null && val >= max) {
      el.textContent = min;
    } else {
      el.textContent = val + 1;
    }
  }

  // Build inning dropdowns (1–9)
  const innings = 9;
  const awaySelect = document.getElementById("awayInningSelect");
  const homeSelect = document.getElementById("homeInningSelect");

  for (let i = 1; i <= innings; i++) {
    awaySelect.innerHTML += `<option value="${i}">${i}</option>`;
    homeSelect.innerHTML += `<option value="${i}">${i}</option>`;
  }

  // Track inning scores
  let awayScores = Array(innings).fill(0);
  let homeScores = Array(innings).fill(0);

  function incInning(team) {
    const select = document.getElementById(team + "InningSelect");
    const inning = parseInt(select.value) - 1;

    if (team === "away") {
      awayScores[inning]++;
      updateScoreboard("away", inning, awayScores[inning]);
    } else {
      homeScores[inning]++;
      updateScoreboard("home", inning, homeScores[inning]);
    }

    updateTotals();
  }

  // Update scoreboard table cell
  function updateScoreboard(team, inning, value) {
    const row = document.querySelector(`tr[data-team="${team}"]`);
    const cell = row.children[inning + 1]; // +1 because col 0 = team name
    cell.textContent = value;
  }

  // Update total runs
  function updateTotals() {
    const awayTotal = awayScores.reduce((a, b) => a + b, 0);
    const homeTotal = homeScores.reduce((a, b) => a + b, 0);

    document.getElementById("awayTotal").textContent = awayTotal;
    document.getElementById("homeTotal").textContent = homeTotal;

    // Also update scoreboard R column
    document.querySelector('tr[data-team="away"] .runs').textContent = awayTotal;
    document.querySelector('tr[data-team="home"] .runs').textContent = homeTotal;
  }
</script>

</body>
</html>
