<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dummy Baseball Game</title>
<style>

body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
}

#broadcast-container {
    width: 1280px;
    background: #000;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(to right, #b00, #004);
    padding: 10px 20px;
    font-size: 20px;
    font-weight: 700;
}

/* SCOREBOARD WRAPPER */
#scoreboard {
    background: #111;
    border-top: 3px solid #00e5ff;
    border-bottom: 3px solid #00e5ff;
    padding: 10px 20px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
}

/* TEAM BLOCKS */
.team-block {
    text-align: center;
    font-size: 20px;
    font-weight: 700;
}

.score-grid {
    display: grid;
    grid-template-columns: repeat(3, 40px);
    gap: 5px;
    margin-top: 5px;
}

.score-grid div {
    background: #222;
    padding: 5px 0;
    border-radius: 4px;
    font-size: 16px;
}

/* INNING + COUNT BLOCK */
#center-info {
    text-align: center;
}

#inning-box {
    background: #222;
    color: #ff0;
    padding: 6px 12px;
    border-radius: 6px;
    font-weight: 700;
    margin-bottom: 6px;
}

#count-box {
    background: #333;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 16px;
}

/* RUNNERS DIAMOND */
#diamond {
    margin-top: 8px;
    display: grid;
    grid-template-columns: 40px 40px 40px;
    grid-template-rows: 40px 40px 40px;
    justify-content: center;
}

.base {
    width: 20px;
    height: 20px;
    background: #444;
    margin: auto;
    transform: rotate(45deg);
}

.base.active {
    background: #ff0;
}

/* PLAYER PANELS */
#player-panels {
    display: flex;
    justify-content: space-between;
    padding: 20px;
}

.panel {
    width: 48%;
    background: #111;
    border: 2px solid #00e5ff;
    border-radius: 10px;
    padding: 15px;
}

.panel-title {
    color: #ff0;
    font-size: 20px;
    margin-bottom: 10px;
}

/* FIELD VIEW */
#field-view {
    background: #000;
    border: 3px solid #00e5ff;
    border-radius: 10px;
    height: 350px;
    margin: 20px;
    position: relative;
}

/* STRIKE ZONE */
#strike-zone {
    width: 140px;
    height: 180px;
    border: 3px solid #fff;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
}

/* PITCH SPEED */
#pitch-speed {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #222;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 18px;
}

/* CONTROL BUTTONS */
#control-bar {
    display: flex;
    justify-content: space-between;
    padding: 15px 20px;
    background: #111;
    border-top: 2px solid #00e5ff;
}

.control-btn {
    flex: 1;
    margin: 0 10px;
    padding: 16px 0;
    font-size: 22px;
    font-weight: 700;
    border: none;
    cursor: pointer;
}

#start-btn { background: #b00; }
#stop-btn  { background: #555; }
#reset-btn { background: #004; }

.control-btn:hover {
    opacity: 0.85;
}

/* PLAY BY PLAY */
#pbp-wrapper {
    padding: 20px;
}

#playByPlay {
    height: 200px;
    overflow-y: auto;
    background: #111;
    border: 2px solid #00e5ff;
    padding: 10px;
    border-radius: 10px;
}

/* TICKER */
#ticker {
    background: #000;
    color: #fff;
    padding: 10px;
    font-size: 18px;
    overflow: hidden;
    white-space: nowrap;
}

#ticker span {
    display: inline-block;
    padding-left: 100%;
    animation: ticker 15s linear infinite;
}

@keyframes ticker {
    from { transform: translateX(0); }
    to   { transform: translateX(-100%); }
}

</style>

</head>
<body>
<div id="broadcast-container">

<header>
    <div>MLB SIMULATION</div>
    <div>LIVE GAME 1</div>
    <div>SPORTS NETWORK</div>
</header>

<!-- SCOREBOARD -->
<div id="scoreboard">

    <!-- TEAM A -->
    <div class="team-block">
        <div id="teamA-name">TEAM A</div>
        <div class="score-grid">
            <div id="gTotal">0</div>
            <div id="gHits">0</div>
            <div id="gErr">0</div>
        </div>
    </div>

    <!-- CENTER INFO -->
    <div id="center-info">
        <div id="inning-box">1ST INNING</div>
        <div id="count-box">
            B:<span id="balls">0</span> 
            S:<span id="strikes">0</span> 
            O:<span id="outs">0</span>
        </div>

        <div id="diamond">
            <div></div> <div id="base2" class="base"></div> <div></div>
            <div id="base3" class="base"></div> <div></div> <div id="base1" class="base"></div>
            <div></div> <div></div> <div></div>
        </div>
    </div>

    <!-- TEAM B -->
    <div class="team-block">
        <div id="teamB-name">TEAM B</div>
        <div class="score-grid">
            <div id="hTotal">0</div>
            <div id="hHits">0</div>
            <div id="hErr">0</div>
        </div>
    </div>

</div>

<!-- PLAYER PANELS -->
<div id="player-panels">
    <div class="panel">
        <div class="panel-title">AT BAT</div>
        <div id="atbat-stats">AVG .000 | HR 0 | RBI 0</div>
    </div>

    <div class="panel">
        <div class="panel-title">PITCHING</div>
        <div id="pitching-stats">P:0 | ERA 0.00 | K 0</div>
    </div>
</div>

<!-- FIELD VIEW -->
<div id="field-view">
    <div id="strike-zone"></div>
    <div id="pitch-speed">0 MPH</div>
</div>

<!-- CONTROL BAR -->
<div id="control-bar">
    <button id="start-btn" class="control-btn" onclick="startSim()">START</button>
    <button id="stop-btn" class="control-btn" onclick="stopSim()">STOP</button>
    <button id="reset-btn" class="control-btn" onclick="resetSim()">RESET</button>
</div>

<!-- PLAY BY PLAY -->
<div id="pbp-wrapper">
    <h2>Play‑by‑Play</h2>
    <div id="playByPlay"></div>
</div>

<!-- TICKER -->
<div id="ticker">
    <span>MLB SCORES: NYY 4 - BOS 2 | LAD 5 - SF 3 | TEX 1 - HOU 6</span>
</div>

</div>



  <script>
    
    const simApiUrl = "https://livescoreapi-2hbs.onrender.com";

const apiUrl = "https://gamefunction-fzdkbcguh9bmhsgx.westus-01.azurewebsites.net";
const params = new URLSearchParams(window.location.search);
const gameID = params.get("gameID");

async function loadTeams() {
    const res = await fetch(`${apiUrl}/api/games/${gameID}`);
    const game = await res.json();

    const isHome = game.home_away === "home";
    const myName = game.myTeam;
    const oppName = game.opponent_team.name;

    const leftTeamName  = isHome ? oppName : myName;
    const rightTeamName = isHome ? myName : oppName;

    document.getElementById("game-id").textContent =
        `${leftTeamName} @ ${rightTeamName}`;
}

loadTeams();

  /* ============================================================
     POLL SERVER SIMULATION ENGINE
  ============================================================ */
  setInterval(async () => {
    try {
        const res = await fetch(`${simApiUrl}/api/sim-game`);
        const sim = await res.json();
        updateFromSim(sim);
    } catch (err) {
        console.error("Sim error:", err);
    }
}, 1000);

  
  /* ============================================================
     UPDATE UI FROM SERVER SIM DATA
  ============================================================ */
 function updateFromSim(sim) {

    // Balls / Strikes / Outs
    document.getElementById("balls").textContent = sim.balls;
    document.getElementById("strikes").textContent = sim.strikes;
    document.getElementById("outs").textContent = sim.outs;

    // Pitch counts
    document.getElementById("pitchesGuest").textContent = sim.teamPitchCount;
    document.getElementById("pitchesHome").textContent = sim.oppPitchCount;

    // Bases
    document.getElementById("base1").classList.toggle("active", sim.runnerOn1);
    document.getElementById("base2").classList.toggle("active", sim.runnerOn2);
    document.getElementById("base3").classList.toggle("active", sim.runnerOn3);

    // Pitch-by-pitch
    document.getElementById("pitchText").textContent = sim.lastPitch;

    // Play-by-play
    const pbp = document.getElementById("playByPlay");
    pbp.innerHTML = sim.playByPlay
        .map(line => `<div class="pbp-line">${line}</div>`)
        .join("");

    // Inning + box score
    updateInnings(sim);
}

  
 function updateInnings(sim) {
    const guest = sim.teamScores;
    const home  = sim.oppScores;

    for (let i = 1; i <= 9; i++) {
        document.getElementById("g" + i).textContent = guest[i - 1] ?? "";
        document.getElementById("h" + i).textContent = home[i - 1] ?? "";
    }

    document.getElementById("gTotal").textContent = guest.reduce((a,b)=>a+b,0);
    document.getElementById("hTotal").textContent = home.reduce((a,b)=>a+b,0);
}

 function startSim() {
        fetch(`${simApiUrl}/api/sim/start`, { method: "POST" });
    }
    
    function stopSim() {
        fetch(`${simApiUrl}/api/sim/stop`, { method: "POST" });
    }
    
    function resetSim() {
        fetch(`${simApiUrl}/api/sim/reset`, { method: "POST" });
    }


  </script>
</body>
</html>
