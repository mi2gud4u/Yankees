<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dummy Baseball Game</title>
<style>
body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
}

#broadcast-container {
    width: 1280px;
    background: #000;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(to right, #b00, #004);
    padding: 10px 20px;
    font-size: 20px;
    font-weight: 700;
}

/* SCOREBOARD TOP BAR (MATCHES MOCKUP TEXT) */
#top-bar {
    background: #111;
    border-top: 3px solid #00e5ff;
    border-bottom: 3px solid #00e5ff;
    padding: 8px 20px;
    display: flex;
    justify-content: space-between;
    font-size: 18px;
}

/* MAIN SCOREBOARD */
#scoreboard {
    background: #111;
    padding: 10px 20px 15px 20px;
    display: grid;
    grid-template-columns: 1.5fr 1fr 1.5fr;
    align-items: center;
}

/* TEAM BLOCKS */
.team-block {
    text-align: left;
    font-size: 20px;
    font-weight: 700;
}

.team-name {
    margin-bottom: 4px;
}

.rhe-labels,
.rhe-values {
    display: grid;
    grid-template-columns: repeat(3, 40px);
    gap: 4px;
    font-size: 14px;
}

.rhe-labels div {
    text-align: center;
    color: #ccc;
}

.rhe-values div {
    background: #222;
    text-align: center;
    padding: 4px 0;
    border-radius: 4px;
}

/* CENTER INFO */
#center-info {
    text-align: center;
}

#inning-box {
    background: #222;
    color: #ff0;
    padding: 6px 12px;
    border-radius: 6px;
    font-weight: 700;
    margin-bottom: 6px;
}

#count-box {
    background: #333;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 16px;
}

/* RUNNERS DIAMOND */
#diamond {
    margin-top: 8px;
    display: grid;
    grid-template-columns: 40px 40px 40px;
    grid-template-rows: 40px 40px 40px;
    justify-content: center;
}

.base {
    width: 20px;
    height: 20px;
    background: #444;
    margin: auto;
    transform: rotate(45deg);
}

.base.active {
    background: #ff0;
}

/* PLAYER PANELS */
#player-panels {
    display: flex;
    justify-content: space-between;
    padding: 20px;
}

.panel {
    width: 48%;
    background: #111;
    border: 2px solid #00e5ff;
    border-radius: 10px;
    padding: 15px;
}

.panel-title {
    color: #ff0;
    font-size: 20px;
    margin-bottom: 10px;
}

.panel-body {
    font-size: 16px;
}

/* FIELD VIEW */
#field-view {
    background: #000;
    border: 3px solid #00e5ff;
    border-radius: 10px;
    height: 350px;
    margin: 0 20px 20px 20px;
    position: relative;
}

/* STRIKE ZONE */
#strike-zone {
    width: 140px;
    height: 180px;
    border: 3px solid #fff;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
}

/* PITCH MARKERS (1,2,3 ETC.) */
.pitch-marker {
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    color: #ff0;
}

/* PITCH SPEED */
#pitch-speed {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #222;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 18px;
}

/* PITCH TEXT (LAST PITCH DESCRIPTION) */
#pitchText {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: #111;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 16px;
}

/* CONTROL BUTTONS – FLAT, BLOCKY */
#control-bar {
    display: flex;
    justify-content: space-between;
    padding: 15px 20px;
    background: #111;
    border-top: 2px solid #00e5ff;
}

.control-btn {
    flex: 1;
    margin: 0 10px;
    padding: 16px 0;
    font-size: 22px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    color: #fff;
}

#start-btn { background: #b00; }
#stop-btn  { background: #555; }
#reset-btn { background: #004; }

.control-btn:hover {
    opacity: 0.85;
}

/* PLAY BY PLAY */
#pbp-wrapper {
    padding: 20px;
}

#playByPlay {
    height: 200px;
    overflow-y: auto;
    background: #111;
    border: 2px solid #00e5ff;
    padding: 10px;
    border-radius: 10px;
    font-size: 14px;
}

/* TICKER */
#ticker {
    background: #000;
    color: #fff;
    padding: 10px;
    font-size: 18px;
    overflow: hidden;
    white-space: nowrap;
}

#ticker span {
    display: inline-block;
    padding-left: 100%;
    animation: ticker 15s linear infinite;
}

@keyframes ticker {
    from { transform: translateX(0); }
    to   { transform: translateX(-100%); }
}
</style>
</head>
<body>
<div id="broadcast-container">

    <header>
        <div>MLB SIMULATION</div>
        <div id="game-id">TEAM A @ TEAM B</div>
        <div>SPORTS NETWORK</div>
    </header>

    <!-- TOP BAR (LIKE MOCKUP: GAME 1, ETC.) -->
    <div id="top-bar">
        <div>GAME 1</div>
        <div>LIVE</div>
        <div>MLB</div>
    </div>

    <!-- MAIN SCOREBOARD -->
    <div id="scoreboard">

        <!-- TEAM A -->
        <div class="team-block">
            <div class="team-name" id="teamA-name">TEAM A</div>
            <div class="rhe-labels">
                <div>R</div><div>H</div><div>E</div>
            </div>
            <div class="rhe-values">
                <div id="gTotal">0</div>
                <div id="pitchesGuest">0</div>
                <div id="gErr">0</div>
            </div>
        </div>

        <!-- CENTER INFO -->
        <div id="center-info">
            <div id="inning-box">1ST INNING</div>
            <div id="count-box">
                B:<span id="balls">0</span>
                &nbsp;S:<span id="strikes">0</span>
                &nbsp;O:<span id="outs">0</span>
            </div>

            <div id="diamond">
                <div></div> <div id="base2" class="base"></div> <div></div>
                <div id="base3" class="base"></div> <div></div> <div id="base1" class="base"></div>
                <div></div> <div></div> <div></div>
            </div>
        </div>

        <!-- TEAM B -->
        <div class="team-block" style="text-align:right;">
            <div class="team-name" id="teamB-name">TEAM B</div>
            <div class="rhe-labels">
                <div>R</div><div>H</div><div>E</div>
            </div>
            <div class="rhe-values">
                <div id="hTotal">0</div>
                <div id="pitchesHome">0</div>
                <div id="hErr">0</div>
            </div>
        </div>

    </div>

    <!-- PLAYER PANELS -->
    <div id="player-panels">
        <div class="panel">
            <div class="panel-title">AT BAT</div>
            <div class="panel-body" id="atbat-stats">
                Johnson — AVG .325 | HR 12 | RBI 38
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">PITCHING</div>
            <div class="panel-body" id="pitching-stats">
                Martinez — P:<span id="pitchesGuest">57</span> | ERA 2.45 | K 5
            </div>
        </div>
    </div>

    <!-- FIELD VIEW WITH STRIKE ZONE AND PITCH SPEED -->
    <div id="field-view">
        <div id="strike-zone">
            <div class="pitch-marker">1</div>
            <div class="pitch-marker">2</div>
            <div class="pitch-marker">3</div>
            <div></div><div></div><div></div>
            <div></div><div></div><div></div>
        </div>
        <div id="pitch-speed">94 MPH</div>
        <div id="pitchText">Last pitch: Fastball low and away</div>
    </div>

    <!-- CONTROL BAR -->
    <div id="control-bar">
        <button id="start-btn" class="control-btn" onclick="startSim()">START</button>
        <button id="stop-btn" class="control-btn" onclick="stopSim()">STOP</button>
        <button id="reset-btn" class="control-btn" onclick="resetSim()">RESET</button>
    </div>

    <!-- PLAY BY PLAY -->
    <div id="pbp-wrapper">
        <h2>Play‑by‑Play</h2>
        <div id="playByPlay"></div>
    </div>

</div>

<script>
/* keep your existing JS here exactly as you sent it */
</script>


  <script>
    
    const simApiUrl = "https://livescoreapi-2hbs.onrender.com";

const apiUrl = "https://gamefunction-fzdkbcguh9bmhsgx.westus-01.azurewebsites.net";
const params = new URLSearchParams(window.location.search);
const gameID = params.get("gameID");

async function loadTeams() {
    const res = await fetch(`${apiUrl}/api/games/${gameID}`);
    const game = await res.json();

    const isHome = game.home_away === "home";
    const myName = game.myTeam;
    const oppName = game.opponent_team.name;

    const leftTeamName  = isHome ? oppName : myName;
    const rightTeamName = isHome ? myName : oppName;

    document.getElementById("game-id").textContent =
        `${leftTeamName} @ ${rightTeamName}`;
}

loadTeams();

  /* ============================================================
     POLL SERVER SIMULATION ENGINE
  ============================================================ */
  setInterval(async () => {
    try {
        const res = await fetch(`${simApiUrl}/api/sim-game`);
        const sim = await res.json();
        updateFromSim(sim);
    } catch (err) {
        console.error("Sim error:", err);
    }
}, 1000);

  
  /* ============================================================
     UPDATE UI FROM SERVER SIM DATA
  ============================================================ */
 function updateFromSim(sim) {

    // Balls / Strikes / Outs
    document.getElementById("balls").textContent = sim.balls;
    document.getElementById("strikes").textContent = sim.strikes;
    document.getElementById("outs").textContent = sim.outs;

    // Pitch counts
    document.getElementById("pitchesGuest").textContent = sim.teamPitchCount;
    document.getElementById("pitchesHome").textContent = sim.oppPitchCount;

    // Bases
    document.getElementById("base1").classList.toggle("active", sim.runnerOn1);
    document.getElementById("base2").classList.toggle("active", sim.runnerOn2);
    document.getElementById("base3").classList.toggle("active", sim.runnerOn3);

    // Pitch-by-pitch
    document.getElementById("pitchText").textContent = sim.lastPitch;

    // Play-by-play
    const pbp = document.getElementById("playByPlay");
    pbp.innerHTML = sim.playByPlay
        .map(line => `<div class="pbp-line">${line}</div>`)
        .join("");

    // Inning + box score
    updateInnings(sim);
}

  
 function updateInnings(sim) {
    const guest = sim.teamScores;
    const home  = sim.oppScores;

    for (let i = 1; i <= 9; i++) {
        document.getElementById("g" + i).textContent = guest[i - 1] ?? "";
        document.getElementById("h" + i).textContent = home[i - 1] ?? "";
    }

    document.getElementById("gTotal").textContent = guest.reduce((a,b)=>a+b,0);
    document.getElementById("hTotal").textContent = home.reduce((a,b)=>a+b,0);
}

 function startSim() {
        fetch(`${simApiUrl}/api/sim/start`, { method: "POST" });
    }
    
    function stopSim() {
        fetch(`${simApiUrl}/api/sim/stop`, { method: "POST" });
    }
    
    function resetSim() {
        fetch(`${simApiUrl}/api/sim/reset`, { method: "POST" });
    }


  </script>
</body>
</html>
