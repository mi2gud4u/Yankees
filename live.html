<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dummy Baseball Game</title>
  <style>
      .electronic-scoreboard {
        border: 6px solid #b22222;
        padding: 25px 20px 20px 20px;
        width: 700px; /* matches real board width */
        margin: 40px auto;
        display: flex;
        flex-direction: column;
        gap: 14px;
    }
    
    /* LED digits */
    .digit {
        background-color: #000;
        color: #ff0000;
        font-family: 'Digital-7', monospace;
        font-size: 2rem;
        padding: 8px 0;
        border-radius: 3px;
        text-shadow: 0 0 8px rgba(255, 0, 0, 0.8);
        border: 1px solid #222;
        width: 48px;
        margin: 0 auto;
    }
    
    .digit.wide {
        width: 70px;
    }
    
    /* Top row proportions match photo */
    .top-row {
        display: grid;
        grid-template-columns: 160px 120px 120px 120px 160px;
        align-items: center;
        border-bottom: 3px solid #b22222;
        padding-bottom: 12px;
        font-size: 1.5rem;
        font-weight: bold;
        text-align: center;
    }
    
    /* Innings grid EXACT spacing */
    .innings-grid {
        display: grid;
        grid-template-columns:
            120px          /* LABEL */
            repeat(9, 1fr) /* Innings 1–9 (equal width, matches photo) */
            120px;         /* TOTAL under PITCHES HOME */
        align-items: center;
        text-align: center;
        padding: 6px 0;
    }
    
    .innings-grid > div {
        padding: 6px 5;
    }
    
    .label {
        font-size: 1.3rem;
        font-weight: 900;
    }
    
    .inning-num {
        font-size: 1.3rem;
        font-weight: bold;
    }
    
    .total-digit {
        width: 70px;
        font-size: 2rem;
    }

    #gameStatus {
        font-size: 20px;
        font-weight: bold;
        color: #fff;
        letter-spacing: 1px;
    }
    
    #gameStatus.live {
        color: #ff3b3b; /* bright red */
    }
    
    #gameStatus.final {
        color: #cccccc; /* gray */
    }
    
    #gameStatus.future {
        color: #4da6ff; /* blue */
    }
    
    #gameStatus.scheduled {
        color: #f2c94c; /* yellow */
    }

</style>

<body>

 <h1 id="game-id" data-game-id="dummy-12345">Yankees @ Red Sox</h1>

<div class="electronic-scoreboard" id="electronicBoardContainer">

    <div class="top-row">
        <div class="top-item">
            PITCHES GUEST
            <div id="pitchesGuest" class="digit wide">0</div>
        </div>

        <div class="top-item">
            BALL
            <div id="balls" class="digit">0</div>
        </div>

        <div class="top-item">
            STRIKE
            <div id="strikes" class="digit">0</div>
        </div>

        <div class="top-item">
            OUT
            <div id="outs" class="digit">0</div>
        </div>

        <div class="top-item">
            PITCHES HOME
            <div id="pitchesHome" class="digit wide">0</div>
        </div>
    </div>

    <div class="innings-grid">
        <div class="label"></div>
        <div class="inning-num">1</div>
        <div class="inning-num">2</div>
        <div class="inning-num">3</div>
        <div class="inning-num">4</div>
        <div class="inning-num">5</div>
        <div class="inning-num">6</div>
        <div class="inning-num">7</div>
        <div class="inning-num">8</div>
        <div class="inning-num">9</div>
    
        <div class="label">TOTAL</div>
    </div>

    <div class="innings-grid">
        <div class="label">GUEST</div>
        <div class="digit" id="g1">0</div>
        <div class="digit" id="g2">0</div>
        <div class="digit" id="g3">0</div>
        <div class="digit" id="g4">0</div>
        <div class="digit" id="g5">0</div>
        <div class="digit" id="g6">0</div>
        <div class="digit" id="g7">0</div>
        <div class="digit" id="g8">0</div>
        <div class="digit" id="g9">0</div>
 
        <div class="digit total-digit" id="gTotal">0</div>
    </div>
    
    <div class="innings-grid">
        <div class="label">HOME</div>
        <div class="digit" id="h1">0</div>
        <div class="digit" id="h2">0</div>
        <div class="digit" id="h3">0</div>
        <div class="digit" id="h4">0</div>
        <div class="digit" id="h5">0</div>
        <div class="digit" id="h6">0</div>
        <div class="digit" id="h7">0</div>
        <div class="digit" id="h8">0</div>
        <div class="digit" id="h9">0</div>
 
    
        <div class="digit total-digit" id="hTotal">0</div>
    </div>


<button onclick="startGame()">Start Automated Game</button>
<button onclick="stopGame()">Stop Game</button>

</div>

<script>
/* ================================
   GAME STATE
================================ */
let inning = 1;
let half = "top"; // top = away batting, bottom = home batting
let outs = 0;
let balls = 0;
let strikes = 0;

let awayScores = Array(9).fill(0);
let homeScores = Array(9).fill(0);

let pitchesGuest = 0;
let pitchesHome = 0;

let gameRunning = false;
let gameInterval = null;

/* ================================
   UPDATE LED SCOREBOARD
================================ */
function refreshInningDisplay() {
    for (let i = 1; i <= 9; i++) {
        const gCell = document.getElementById("g" + i);
        const hCell = document.getElementById("h" + i);

        // BEFORE current inning → show scores
        if (i < inning) {
            gCell.textContent = awayScores[i - 1] || 0;
            hCell.textContent = homeScores[i - 1] || 0;
        }

        // CURRENT inning
        else if (i === inning) {
            if (half === "top") {
                gCell.textContent = awayScores[i - 1] || 0;
                hCell.innerHTML = "&nbsp;"; // hide home until bottom
            } else {
                gCell.textContent = awayScores[i - 1] || 0;
                hCell.textContent = homeScores[i - 1] || 0;
            }
        }

        // FUTURE innings → keep LED box but hide number
        else {
            gCell.innerHTML = "&nbsp;";
            hCell.innerHTML = "&nbsp;";
        }
    }
}


function updateLED() {
    document.getElementById("balls").textContent = balls;
    document.getElementById("strikes").textContent = strikes;
    document.getElementById("outs").textContent = outs;

    document.getElementById("pitchesGuest").textContent = pitchesGuest;
    document.getElementById("pitchesHome").textContent = pitchesHome;

    refreshInningDisplay(); // ← NEW LINE

    document.getElementById("gTotal").textContent = awayScores.reduce((a,b)=>a+b,0);
    document.getElementById("hTotal").textContent = homeScores.reduce((a,b)=>a+b,0);
}


/* ================================
   RANDOM PLAY GENERATOR
================================ */
function simulatePitch() {
    // Random pitch outcome
    const outcome = Math.random();

    // Increment pitch count
    if (half === "top") pitchesGuest++;
    else pitchesHome++;

    // 0–0.45 = ball
    if (outcome < 0.45) {
        balls++;
        if (balls >= 4) {
            scoreRun();
            resetCount();
        }
    }
    // 0.45–0.80 = strike
    else if (outcome < 0.80) {
        strikes++;
        if (strikes >= 3) {
            recordOut();
            resetCount();
        }
    }
    // 0.80–1.00 = ball in play
    else {
        const hit = Math.random();

        // 20% chance of run scoring
        if (hit < 0.20) {
            scoreRun();
        } else {
            recordOut();
        }
        resetCount();
    }

    updateLED();
}

/* ================================
   COUNT / OUT / INNING LOGIC
================================ */
function resetCount() {
    balls = 0;
    strikes = 0;
}

function recordOut() {
    outs++;
    if (outs >= 3) {
        changeHalfInning();
    }
}

function changeHalfInning() {
    outs = 0;
    balls = 0;
    strikes = 0;

    if (half === "top") {
        half = "bottom";
    } else {
        half = "top";
        inning++;
    }

    if (inning > 9) {
        stopGame();
    }
  refreshInningDisplay();

}

function scoreRun() {
    if (half === "top") {
        awayScores[inning - 1]++;
    } else {
        homeScores[inning - 1]++;
    }
}

/* ================================
   START / STOP AUTOMATION
================================ */
function startGame() {
    if (gameRunning) return;
    gameRunning = true;

    gameInterval = setInterval(simulatePitch, 800); // every 0.8 sec
}

function stopGame() {
    gameRunning = false;
    clearInterval(gameInterval);
    alert("Game finished!");
}
</script>



</body>
</html>
