<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Game</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1, h2 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        .back-btn {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            width: 200px;
        }

        .back-btn:hover {
            background: #005fa3;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Game Details</h1>

    <div id="gameInfo"></div>

    <h2>Score</h2>
    <table id="scoreTable"></table>

    <h2>Innings</h2>
    <table id="inningsTable"></table>

    <h2>Totals</h2>
    <table id="totalsTable"></table>

    <button class="back-btn" onclick="window.location.href='index.html'">Back to Schedule</button>
</div>

<script>
    const apiUrl = "https://gamefunction-fzdkbcguh9bmhsgx.westus-01.azurewebsites.net";

    // Get gameID from URL
    const params = new URLSearchParams(window.location.search);
    const gameID = params.get("gameID");

    async function loadGame() {
        const response = await fetch(`${apiUrl}/api/GetGame?gameID=${gameID}`);
        const game = await response.json();

        const infoDiv = document.getElementById("gameInfo");

        infoDiv.innerHTML = `
            <h2>${game.MyTeam} vs ${game.OpponentTeamName}</h2>
            <p>Status: <strong>${game.GameStatus.toUpperCase()}</strong></p>
        `;

        // Only show score + innings if FINAL
        if (game.GameStatus !== "completed") {
            document.getElementById("scoreTable").innerHTML = "<tr><td>Game not completed yet.</td></tr>";
            document.getElementById("inningsTable").innerHTML = "";
            document.getElementById("totalsTable").innerHTML = "";
            return;
        }

        // SCORE TABLE
        document.getElementById("scoreTable").innerHTML = `
            <tr><th>Team</th><th>Opponent</th></tr>
            <tr><td>${game.Score.Team}</td><td>${game.Score.Opponent}</td></tr>
        `;

        // INNINGS TABLE
        const inningsTeam = game.Innings.Team;
        const inningsOpp = game.Innings.Opponent;

        let inningsHTML = "<tr><th>Inning</th><th>Team</th><th>Opponent</th></tr>";

        for (let i = 0; i < inningsTeam.length; i++) {
            inningsHTML += `
                <tr>
                    <td>${i + 1}</td>
                    <td>${inningsTeam[i]}</td>
                    <td>${inningsOpp[i]}</td>
                </tr>
            `;
        }

        document.getElementById("inningsTable").innerHTML = inningsHTML;

        // TOTALS TABLE
        document.getElementById("totalsTable").innerHTML = `
            <tr><th></th><th>Runs</th><th>Hits</th><th>Errors</th></tr>
            <tr>
                <td>${game.MyTeam}</td>
                <td>${game.Totals.Team[0]}</td>
                <td>${game.Totals.Team[1]}</td>
                <td>${game.Totals.Team[2]}</td>
            </tr>
            <tr>
                <td>${game.OpponentTeamName}</td>
                <td>${game.Totals.Opponent[0]}</td>
                <td>${game.Totals.Opponent[1]}</td>
                <td>${game.Totals.Opponent[2]}</td>
            </tr>
        `;
    }

    loadGame();
</script>

</body>
</html>
