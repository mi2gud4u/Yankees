<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Baseball Scoreboard</title>

    <style>
        body {
            background: #0b0b0b;
            color: white;
            font-family: Arial, sans-serif;
        }

        .scoreboard {
            width: 520px;
            margin: 40px auto;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0,0,0,0.4);
        }

        .header h2 {
            margin: 0;
            text-align: center;
        }

        .scores {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 25px 0;
        }

        .team {
            text-align: center;
            width: 40%;
        }

        .team h3 {
            margin: 0;
            font-size: 16px;
        }

        .score {
            display: block;
            font-size: 40px;
            font-weight: bold;
            margin-top: 5px;
        }

        .pitch-small {
            font-size: 14px;
            margin-top: 4px;
            color: #ccc;
        }

        .inning-display {
            width: 20%;
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            position: relative;
        }

        .base {
            position: absolute;
            width: 18px;
            height: 18px;
            background: #777;
            transform: rotate(45deg);
        }

        .base.on {
            background: red !important;
        }

        .base.second { top: -32px; left: 50%; transform: translateX(-50%) rotate(45deg); }
        .base.first  { top: 50%; right: -32px; transform: translateY(-50%) rotate(45deg); }
        .base.third  { top: 50%; left: -32px; transform: translateY(-50%) rotate(45deg); }
        .base.home   { bottom: -32px; left: 50%; transform: translateX(-50%) rotate(45deg); }

        .diamond-line {
            position: absolute;
            background: #777;
            height: 2px;
        }

        .line-1-2 { width: 45px; top: 8%; right: -6px; transform: rotate(35deg); }
        .line-2-3 { width: 45px; top: 8%; left: -6px; transform: rotate(-35deg); }
        .line-3-home { width: 45px; bottom: 8%; left: -6px; transform: rotate(35deg); }
        .line-home-1 { width: 45px; bottom: 8%; right: -6px; transform: rotate(-35deg); }

        .inning-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }

        .inning-table th,
        .inning-table td {
            border: 1px solid #444;
            padding: 6px;
            text-align: center;
        }

        .inning-table th {
            background: #333;
        }

        .bottom-bar {
            margin-top: 20px;
            padding: 12px;
            background: #222;
            border-radius: 8px;
            text-align: center;
        }

        .bottom-bar span {
            font-size: 18px;
            font-weight: bold;
            margin: 0 15px;
        }

        #updatedTime {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div id="scoreboard" class="scoreboard">

    <div class="header">
        <h2 id="teamName">Loading...</h2>
    </div>

    <div class="scores">
        <div class="team">
            <h3 id="yourTeamName">Your Team</h3>
            <span id="yourScore" class="score">0</span>
            <div class="pitch-small">Pitches: <span id="pitchTeam">0</span></div>
        </div>

        <div class="inning-display">
            <span id="currentInning">-</span>

            <div class="base second" id="base2"></div>
            <div class="base first" id="base1"></div>
            <div class="base third" id="base3"></div>
            <div class="base home" id="baseHome"></div>

            <div class="diamond-line line-1-2"></div>
            <div class="diamond-line line-2-3"></div>
            <div class="diamond-line line-3-home"></div>
            <div class="diamond-line line-home-1"></div>
        </div>

        <div class="team">
            <h3 id="opponentTeamName">Opponent</h3>
            <span id="opponentScore" class="score">0</span>
            <div class="pitch-small">Pitches: <span id="pitchOpp">0</span></div>
        </div>
    </div>

    <table class="inning-table">
        <thead id="inningHeader"></thead>
        <tbody id="inningBody"></tbody>
    </table>

    <div class="bottom-bar">
        <span>Balls: <span id="balls">0</span></span>
        <span>Strikes: <span id="strikes">0</span></span>
        <span>Outs: <span id="outs">0</span></span>
    </div>

    <p id="updatedTime"></p>
</div>

<script>
    const apiUrl = "https://gamefunction-fzdkbcguh9bmhsgx.westus-01.azurewebsites.net";

    const params = new URLSearchParams(window.location.search);
    const gameID = params.get("gameID");

    async function loadGame() {
        const response = await fetch(`${apiUrl}/api/ListGames?gameID=${gameID}`);
        const games = await response.json();
        const game = games.find(g => g.GameID === gameID);
        //const game = games[0];  // FIX: ListGames returns an array
    
        document.getElementById("teamName").textContent =
            `${game.MyTeam} vs ${game.OpponentTeamName}`;
    
        document.getElementById("yourTeamName").textContent = game.MyTeam;
        document.getElementById("opponentTeamName").textContent = game.OpponentTeamName;
    
        if (game.GameStatus !== "completed") {
            document.getElementById("yourScore").textContent = "-";
            document.getElementById("opponentScore").textContent = "-";
            document.getElementById("currentInning").textContent = "-";
            document.getElementById("inningHeader").innerHTML = "";
            document.getElementById("inningBody").innerHTML =
                `<tr><td colspan="20">Game not completed yet.</td></tr>`;
            return;
        }
    
        document.getElementById("yourScore").textContent = game.Score.Team;
        document.getElementById("opponentScore").textContent = game.Score.Opponent;
    
        const innings = game.Innings.Team.length;
    
        let header = "<tr><th></th>";
        for (let i = 1; i <= innings; i++) header += `<th>${i}</th>`;
        header += "<th>R</th><th>H</th><th>E</th></tr>";
        document.getElementById("inningHeader").innerHTML = header;
    
        let body = "";
    
        body += `<tr><td>${game.MyTeam}</td>`;
        game.Innings.Team.forEach(s => body += `<td>${s}</td>`);
        game.Totals.Team.forEach(t => body += `<td>${t}</td>`);
        body += "</tr>";
    
        body += `<tr><td>${game.OpponentTeamName}</td>`;
        game.Innings.Opponent.forEach(s => body += `<td>${s}</td>`);
        game.Totals.Opponent.forEach(t => body += `<td>${t}</td>`);
        body += "</tr>";
    
        document.getElementById("inningBody").innerHTML = body;
    
        document.getElementById("updatedTime").textContent =
            "Loaded from DynamoDB: " + new Date().toLocaleTimeString();
    }


    loadGame();
</script>

</body>
</html>
