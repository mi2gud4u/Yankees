<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game View</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0C2340;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .scores {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .team {
            text-align: center;
        }

        .score {
            font-size: 32px;
            font-weight: bold;
        }

        .inning-display {
            position: relative;
            width: 200px;
            height: 200px;
            margin: auto;
        }

        .base {
            width: 30px;
            height: 30px;
            background: gray;
            position: absolute;
            transform: rotate(45deg);
        }

        .on {
            background: yellow;
        }

        .first { bottom: 10px; right: 10px; }
        .second { top: 10px; right: 85px; }
        .third { bottom: 10px; left: 10px; }
        .home { bottom: 85px; right: 85px; }

        .inning-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #13274F;
        }

        .inning-table th, .inning-table td {
            border: 1px solid white;
            padding: 6px;
            text-align: center;
        }

        .bottom-bar {
            margin-top: 20px;
            font-size: 20px;
            display: flex;
            justify-content: space-around;
        }

        button {
            margin-top: 20px;
            padding: 12px;
            background: #E4002B;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #B30022;
        }
    </style>
</head>

<body>

<h2>Live Game View</h2>

<button onclick="window.location.href='index.html'">⬅ Back to Index</button>

<!-- SCORES + INNING + DIAMOND -->
<div class="scores">
    <div class="team">
        <h3 id="yourTeamName">Your Team</h3>
        <span id="yourScore" class="score">0</span>
        <div class="pitch-small">Pitches: <span id="pitchTeam">0</span></div>
    </div>

    <div class="inning-display">
        <span id="currentInning">1</span>

        <div class="base second" id="base2"></div>
        <div class="base first" id="base1"></div>
        <div class="base third" id="base3"></div>
        <div class="base home" id="baseHome"></div>
    </div>

    <div class="team">
        <h3 id="opponentTeamName">Opponent</h3>
        <span id="opponentScore" class="score">0</span>
        <div class="pitch-small">Pitches: <span id="pitchOpp">0</span></div>
    </div>
</div>

<!-- INNING TABLE -->
<table class="inning-table">
    <thead id="inningHeader"></thead>
    <tbody id="inningBody"></tbody>
</table>

<!-- BALLS / STRIKES / OUTS -->
<div class="bottom-bar" id="bottomBar">
    <span>Balls: <span id="balls">0</span></span>
    <span>Strikes: <span id="strikes">0</span></span>
    <span>Outs: <span id="outs">0</span></span>
</div>

<p id="updatedTime"></p>

<script>
/* ------------------------------
   READ URL PARAMETERS
--------------------------------*/
const params = new URLSearchParams(window.location.search);
const passedTeam = params.get("team");
const passedGameID = params.get("game");

/* ------------------------------
   AUTO-LOAD GAME ON PAGE OPEN
--------------------------------*/
if (passedTeam) {
    document.getElementById("yourTeamName").textContent = passedTeam;
}
if (passedGameID) {
    window.gameID = passedGameID;
}

/* ------------------------------
   API ENDPOINTS (dynamic)
--------------------------------*/
let scoreApi = `https://statsapi.mlb.com/api/v1.1/game/${passedGameID}/feed/live`;
let pitchApi = `https://statsapi.mlb.com/api/v1/game/${passedGameID}/playByPlay`;

/* ------------------------------
   FETCH SCORE
--------------------------------*/
async function fetchScore() {
    try {
        const response = await fetch(scoreApi);
        const data = await response.json();
        updateScoreboard(data);
    } catch (err) {
        console.error("Score fetch error:", err);
    }
}

/* ------------------------------
   FETCH PITCH + RUNNERS
--------------------------------*/
async function fetchPitch() {
    try {
        const response = await fetch(pitchApi);
        const events = await response.json();
        const reversed = [...events].reverse();

        const lastPitch = reversed.find(e => e.event_type === "pitch");
        if (lastPitch?.count) {
            document.getElementById("balls").textContent = lastPitch.count.balls;
            document.getElementById("strikes").textContent = lastPitch.count.strikes;
        }

        if (lastPitch?.pitch_count !== undefined) {
            document.getElementById("pitchTeam").textContent = lastPitch.pitch_count;
            document.getElementById("pitchOpp").textContent = lastPitch.pitch_count;
        }

        const lastPlay = reversed.find(e =>
            e.event_type === "play" ||
            e.event_type === "at_bat" ||
            e.event_type === "pitch"
        );

        if (lastPlay?.outs !== undefined) {
            document.getElementById("outs").textContent = lastPlay.outs;
        }

        if (lastPlay?.runners) {
            document.getElementById("base1").classList.toggle("on", !!lastPlay.runners.first);
            document.getElementById("base2").classList.toggle("on", !!lastPlay.runners.second);
            document.getElementById("base3").classList.toggle("on", !!lastPlay.runners.third);
        }

    } catch (err) {
        console.error("Pitch fetch error:", err);
    }
}

/* ------------------------------
   UPDATE SCOREBOARD
--------------------------------*/
function updateScoreboard(game) {
    const yourTeam = passedTeam || "AAA Yankees";
    const oppTeam = game.gameData.teams.away.name;

    document.getElementById("yourTeamName").textContent = yourTeam;
    document.getElementById("opponentTeamName").textContent = oppTeam;

    const linescore = game.liveData.linescore;

    document.getElementById("yourScore").textContent = linescore.teams.home.runs;
    document.getElementById("opponentScore").textContent = linescore.teams.away.runs;

    document.getElementById("currentInning").textContent = linescore.currentInning;
}

/* ------------------------------
   AUTO REFRESH EVERY 10 SECONDS
--------------------------------*/
setInterval(() => {
    fetchScore();
    fetchPitch();
}, 10000);

// Initial load
fetchScore();
fetchPitch();
</script>

</body>
</html>
