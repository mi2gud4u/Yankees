<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Schedule</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input, button {
            padding: 10px;
            margin: 5px 0;
            width: 100%;
            font-size: 16px;
        }

        button {
            cursor: pointer;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: #005fa3;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .delete-btn {
            background: #d9534f;
        }

        .delete-btn:hover {
            background: #b52b27;
        }

        .view-btn {
            background: #5cb85c;
        }

        .view-btn:hover {
            background: #3d8b3d;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Game Schedule</h1>

    <h3>Add Game</h3>
    <input id="teamName" placeholder="Team Name">
    <input id="gameId" placeholder="Game ID">
    <button onclick="addGame()">Add Game</button>

    <h3>Games</h3>
    <table id="gamesTable">
        <thead>
            <tr>
                <th>My Team</th>
                <th>Game ID</th>
                <th style="width: 160px;">Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const API_BASE = "https://gamefunction-fzdkbcguh9bmhsgx.westus-01.azurewebsites.net/api";
    
    async function loadGames() {
        const res = await fetch(`${API_BASE}/ListGames`, {
            cache: "no-store"
        });

        console.log(game);
    
        const games = await res.json();
    
        const tbody = document.querySelector("#gamesTable tbody");
        tbody.innerHTML = "";
    
        games.forEach(game => {
            const row = document.createElement("tr");
    
            row.innerHTML = `
                <td>${game.myTeam}</td>
                <td>${game.gameID}</td>
                <td>
                    <button class="view-btn" onclick="viewGame('${game.gameID}', '${game.myTeam}')">View</button>
                    <button class="delete-btn" onclick="deleteGame('${game.gameID}')">Delete</button>
                </td>
            `;

    
            tbody.appendChild(row);
        });

        console.log(game);
    }
    
    async function addGame() {
        const teamName = document.getElementById("teamName").value.trim();
        const gameId = document.getElementById("gameId").value.trim();
    
        if (!teamName || !gameId) {
            alert("Enter both Team Name and Game ID");
            return;
        }
    
        await fetch(`${API_BASE}/AddGame`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                MyTeam: teamName,
                Id: gameId
            })
        });
    
        document.getElementById("teamName").value = "";
        document.getElementById("gameId").value = "";
    
        loadGames();
    }
    
    function viewGame(id, team) {
        window.location.href = `viewgame.html?game=${encodeURIComponent(id)}&team=${encodeURIComponent(team)}`;
    }
    
    async function deleteGame(id) {
        await fetch(`${API_BASE}/DeleteGame/${id}`, { method: "DELETE" });
        loadGames();
    }
    
    loadGames();

</script>

</body>
</html>
