<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Schedule</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input, button {
            padding: 10px;
            margin: 5px 0;
            width: 100%;
            font-size: 16px;
        }

        button {
            cursor: pointer;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: #005fa3;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .delete-btn {
            background: #d9534f;
        }

        .delete-btn:hover {
            background: #b52b27;
        }

        .view-btn {
            background: #5cb85c;
        }

        .view-btn:hover {
            background: #3d8b3d;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Game Schedule</h1>

    <h3>Add Game</h3>
    <input id="teamName" placeholder="Team Name">
    <input id="gameId" placeholder="Game ID">
    <button onclick="addGame()">Add Game</button>

    <h2>Games</h2>
    <table id="gamesTable">
        <thead>
            <tr>
                <th>My Team</th>
                <th>Opponent</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="gamesBody"></tbody>
    </table>

</div>

<script>
    const apiUrl = "https://your-api-url-here"; // keep your existing URL
    
    async function loadGames() {
        const response = await fetch(`${apiUrl}/api/games`);
        const games = await response.json();
    
        const tbody = document.getElementById("gamesBody");
        tbody.innerHTML = "";
    
        games.forEach(game => {
            const tr = document.createElement("tr");
    
            // Determine status text
            let statusText = "";
            if (game.game_status === "scheduled") {
                const date = new Date(game.start_ts);
                statusText = date.toLocaleString("en-US", {
                    month: "short",
                    day: "numeric",
                    hour: "numeric",
                    minute: "2-digit"
                });
            } else if (game.game_status === "in_progress") {
                statusText = "LIVE";
            } else if (game.game_status === "completed") {
                statusText = "FINAL";
            }
    
            tr.innerHTML = `
                <td>${game.myTeam}</td>
                <td>${game.opponentTeamName}</td>
                <td>${statusText}</td>
                <td>
                    <button onclick="viewGame('${game.gameID}')">View</button>
                    <button onclick="deleteGame('${game.gameID}')">Delete</button>
                </td>
            `;
    
            tbody.appendChild(tr);
        });
    }
    
    function viewGame(gameID) {
        window.location.href = \`viewGame.html?gameID=\${gameID}\`;
    }
    
    async function deleteGame(gameID) {
        await fetch(\`${apiUrl}/api/deleteGame?gameID=\${gameID}\`, { method: "DELETE" });
        loadGames();
    }
    
    loadGames();
</script>


</body>
</html>
