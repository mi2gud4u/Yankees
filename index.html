<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Schedule</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input, button {
            padding: 10px;
            margin: 5px 0;
            width: 100%;
            font-size: 16px;
        }

        button {
            cursor: pointer;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: #005fa3;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .delete-btn {
            background: #d9534f;
        }

        .delete-btn:hover {
            background: #b52b27;
        }

        .view-btn {
            background: #5cb85c;
        }

        .view-btn:hover {
            background: #3d8b3d;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Game Schedule</h1>

    <h3>Add Game</h3>
    <input id="teamName" placeholder="Team Name">
    <input id="gameId" placeholder="Game ID">
    <button onclick="addGame()">Add Game</button>

    <h2>Games</h2>
    <table id="gamesTable">
        <thead>
            <tr>
                <th>My Team</th>
                <th>Opponent</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="gamesBody"></tbody>
    </table>

</div>

<script>
    const apiUrl = "https://gamefunction-fzdkbcguh9bmhsgx.westus-01.azurewebsites.net";

    async function loadGames() {
        const response = await fetch(`${apiUrl}/api/ListGames`);
        const games = await response.json();

        const tbody = document.getElementById("gamesBody");
        tbody.innerHTML = "";

        games.forEach(game => {
            const tr = document.createElement("tr");

            // Determine status text
            let statusText = "";
            if (game.GameStatus === "scheduled") {
                statusText = "Scheduled";
            } else if (game.GameStatus === "in_progress") {
                statusText = "LIVE";
            } else if (game.GameStatus === "completed") {
                statusText = "FINAL";
            }

            tr.innerHTML = `
                <td>${game.MyTeam}</td>
                <td>${game.OpponentTeamName}</td>
                <td>${statusText}</td>
                <td>
                    <button onclick="viewGame('${game.GameID}')">View</button>
                    <button onclick="deleteGame('${game.GameID}')">Delete</button>
                </td>
            `;

            tbody.appendChild(tr);
        });
    }

    async function addGame() {
        const teamName = document.getElementById("teamName").value.trim();
        const gameId = document.getElementById("gameId").value.trim();
    
        if (!teamName || !gameId) {
            alert("Please enter both Team Name and Game ID.");
            return;
        }
    
        const payload = {
            MyTeam: teamName,
            GameID: gameId
        };
    
        try {
            const response = await fetch(`${apiUrl}/api/AddGame`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
    
            if (!response.ok) {
                alert("Error adding game.");
                return;
            }
    
            document.getElementById("teamName").value = "";
            document.getElementById("gameId").value = "";
    
            loadGames();
    
        } catch (err) {
            console.error("AddGame error:", err);
            alert("Failed to add game.");
        }
    }


    function viewGame(gameID) {
        window.location.href = `viewGame.html?gameID=${gameID}`;
    }

    async function deleteGame(gameID) {
        await fetch(`${apiUrl}/api/deleteGame?gameID=${gameID}`, { method: "DELETE" });
        loadGames();
    }

    loadGames();
</script>

</body>
</html>
